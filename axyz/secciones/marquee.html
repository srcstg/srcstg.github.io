<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AXYZ — Marquee de logos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * {
      font-family: 'Avenir', 'Avenir Next', 'Avenir Next LT Pro',
                   -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .logos-wrapper { overflow: hidden; }
    .logos-track {
      display: flex;
      gap: 16px;
      width: max-content;
      animation: marquee 50s linear infinite;
    }
    .logos-track:hover { animation-play-state: paused; }
    @keyframes marquee {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
  
    /* Blanco y negro: imagenes excepto el logo AXYZ */
    img:not([alt="AXYZ"]) {
      filter: grayscale(1);
    }
    /* Excepción: logos de clientes en el marquee se ven a color */
    .logos-track img {
      filter: none;
    }
</style>
</head>
<body class="bg-zinc-900 text-white">

<!--
  ============================================================
  Sección autosuficiente: Marquee "Empresas que nos respaldan"

    class AxyzMarquee extends HTMLElement {
      connectedCallback() {
        this.innerHTML = `<style>...</style><section>...</section>`;
      }
    }
    customElements.define('axyz-marquee', AxyzMarquee);
  ============================================================
-->
