<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Display Oficina</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    transition: background 2.5s ease;
  }

  .orb {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    filter: blur(100px);
    opacity: 0.5;
    transition: background 2.5s ease;
  }
  .orb-1 { width:800px; height:800px; top:-250px; left:-200px; animation: od1 30s ease-in-out infinite; }
  .orb-2 { width:600px; height:600px; bottom:-150px; right:-150px; animation: od2 38s ease-in-out infinite; }
  .orb-3 { width:450px; height:450px; top:38%; left:42%; animation: od3 24s ease-in-out infinite; }
  @keyframes od1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(90px,70px)} }
  @keyframes od2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-80px,-60px)} }
  @keyframes od3 { 0%,100%{transform:translate(0,0)} 33%{transform:translate(55px,-45px)} 66%{transform:translate(-45px,55px)} }

  #moon {
    position: absolute;
    width: 80px; height: 80px;
    border-radius: 50%;
    top: 6%; right: 8%;
    opacity: 0;
    pointer-events: none;
    z-index: 2;
    transition: opacity 2.5s ease;
    background: radial-gradient(circle at 38% 38%, #fffde0 0%, #f5e88a 40%, #e0c840 100%);
    box-shadow: 0 0 40px 12px rgba(240,220,80,0.18), 0 0 80px 30px rgba(240,220,80,0.08);
  }
  #sun {
    position: absolute;
    width: 90px; height: 90px;
    border-radius: 50%;
    top: 5%; right: 7%;
    opacity: 0;
    pointer-events: none;
    z-index: 2;
    transition: opacity 2.5s ease;
    background: radial-gradient(circle at 40% 40%, #fffbe0 0%, #ffe066 40%, #ffb300 100%);
    box-shadow: 0 0 60px 20px rgba(255,200,40,0.22), 0 0 120px 50px rgba(255,160,0,0.10);
  }

  /* Logos */
  .logo-wrap {
    position: absolute;
    pointer-events: none;
    z-index: 10;
  }
  .logo-wrap svg { transition: fill 2.5s ease; }

  .logo-sorrymom { width: 320px; top: 14%; left:  7%; animation: fl1 18s ease-in-out infinite; }
  .logo-sorrymom svg { width: 100%; }
  .logo-twg      { width: 260px; top: 52%; left: 56%; animation: fl2 22s ease-in-out infinite; }
  .logo-twg svg  { width: 100%; }
  .logo-brutal   { width: 360px; top: 70%; left: 10%; animation: fl3 26s ease-in-out infinite; }
  .logo-brutal svg { width: 100%; }

  @keyframes fl1 { 0%{transform:translate(0,0) rotate(0deg)} 20%{transform:translate(28px,-22px) rotate(.4deg)} 40%{transform:translate(50px,12px) rotate(-.3deg)} 60%{transform:translate(18px,36px) rotate(.45deg)} 80%{transform:translate(-18px,8px) rotate(-.2deg)} 100%{transform:translate(0,0) rotate(0deg)} }
  @keyframes fl2 { 0%{transform:translate(0,0) rotate(0deg)} 25%{transform:translate(-36px,28px) rotate(-.5deg)} 50%{transform:translate(18px,55px) rotate(.3deg)} 75%{transform:translate(46px,-18px) rotate(.55deg)} 100%{transform:translate(0,0) rotate(0deg)} }
  @keyframes fl3 { 0%{transform:translate(0,0) rotate(0deg)} 30%{transform:translate(42px,-28px) rotate(.28deg)} 55%{transform:translate(-22px,-46px) rotate(-.4deg)} 80%{transform:translate(28px,18px) rotate(.18deg)} 100%{transform:translate(0,0) rotate(0deg)} }

  #lava-wrapper {
    position: absolute;
    inset: 0;
    z-index: 5;
    filter: blur(28px) contrast(18);
  }
  #blob-canvas { position:absolute; inset:0; width:100%; height:100%; }
  #glass-canvas { position:absolute; inset:0; width:100%; height:100%; z-index:6; pointer-events:none; }
  #stars-canvas { position:absolute; inset:0; width:100%; height:100%; z-index:1; pointer-events:none; opacity:0; transition:opacity 2.5s ease; }

  /* ── Controles de hora ── */
  #time-controls {
    position: absolute;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    display: flex;
    align-items: center;
    gap: 16px;
    background: rgba(0,0,0,0.18);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.22);
    border-radius: 50px;
    padding: 10px 20px;
    user-select: none;
    transition: opacity 0.3s ease;
  }
  #time-controls:hover { opacity: 1 !important; }

  .time-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.35);
    background: rgba(255,255,255,0.15);
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, transform 0.15s;
    flex-shrink: 0;
  }
  .time-btn:hover {
    background: rgba(255,255,255,0.28);
    transform: scale(1.08);
  }
  .time-btn:active { transform: scale(0.94); }

  #time-display {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 120px;
  }
  #time-clock {
    font-family: 'SF Pro Display', 'Helvetica Neue', 'Segoe UI', sans-serif;
    font-size: 22px;
    font-weight: 300;
    letter-spacing: 0.12em;
    color: #fff;
    line-height: 1;
  }
  #time-moment {
    font-family: 'SF Pro Display', 'Helvetica Neue', 'Segoe UI', sans-serif;
    font-size: 11px;
    letter-spacing: 0.18em;
    color: rgba(255,255,255,0.65);
    margin-top: 3px;
    text-transform: uppercase;
  }

  /* Barra de progreso circular del día */
  #time-arc {
    position: relative;
    width: 42px; height: 42px;
    flex-shrink: 0;
  }
  #time-arc svg { position:absolute; top:0; left:0; }

  /* Botón modo auto */
  #auto-btn {
    font-family: 'SF Pro Display', 'Helvetica Neue', sans-serif;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.55);
    background: none;
    border: 1px solid rgba(255,255,255,0.22);
    border-radius: 20px;
    padding: 4px 10px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  #auto-btn:hover { color: #fff; border-color: rgba(255,255,255,0.5); }
  #auto-btn.active { color: #fff; border-color: rgba(255,255,255,0.6); background: rgba(255,255,255,0.12); }
</style>
</head>

  <div id="moon"></div>
  <div id="sun"></div>
  <div class="orb orb-1" id="orb1"></div>
  <div class="orb orb-2" id="orb2"></div>
  <div class="orb orb-3" id="orb3"></div>

  <div id="lava-wrapper"><canvas id="blob-canvas"></canvas></div>
  <canvas id="glass-canvas"></canvas>

      <path d="M575.33,273.68L686.79,10.54h123.46v265.54L921.72,10.54h141.43l-220.54,464.09h-137.84v-234.44l-98.28,234.44h-141.43L435.09,10.54h136.64l3.6,3.59v259.56ZM1495.18,143.97c-24.25-166.5-249.21-178.3-357.64-87.91-92.33,76.97-131.08,244.99-67.92,349.92,57,94.72,207.73,109.75,282.38,27.98l-2.37,40.67h89.89l53.94-255.97h-188.18l-22.77,100.47h64.72c-22.61,63.01-133.49,70.28-156.95,4.72-21.13-59.05,4.73-173.36,69.04-198.91,44.51-17.69,100.31-4.62,99.9,50.65h139.04c-3.74-10.35-1.52-21.06-3.06-31.63ZM25.17,10.54L0,132.54h127.05L55.14,474.63h146.23l69.76-341.84,129.1-.36,23.64-116.47-3.15-5.42H25.17ZM1611.91,132.32c70.04-9.53,60.24-118.89-13.43-114.06-79.45,5.21-69.5,125.35,13.43,114.06ZM1565.72,52.76c32-54.49,111.12,7.7,64.37,53.47-2.67-10.31-3.81-22.2-11.98-29.92,16.76-4.17,7.17-29.89-3.61-29.89h-34.76v59.81h14.4s1.21-23.95,1.21-23.95c14.8.09,14.9,12.74,18.27,23.64l16.47.31c-36.99,36.21-88.67-12.09-64.37-53.47ZM1594.12,58.37c23.98-3.24,21.39,15.07.02,14.37l-.02-14.37Z"/>

  <div class="logo-wrap logo-brutal">

  <!-- Controles -->
  <div id="time-controls">
    <button class="time-btn" id="btn-prev" title="Hora anterior">&#8592;</button>

    <div id="time-arc">
      <svg width="42" height="42" viewBox="0 0 42 42">
        <!-- track -->
        <circle cx="21" cy="21" r="17" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2.5"/>
        <!-- progress -->
        <circle id="arc-progress" cx="21" cy="21" r="17" fill="none"
          stroke="rgba(255,255,255,0.7)" stroke-width="2.5"
          stroke-linecap="round"
          stroke-dasharray="106.8 106.8"
          stroke-dashoffset="106.8"
          transform="rotate(-90 21 21)"/>
        <!-- dot posición actual -->
        <circle id="arc-dot" cx="21" cy="4" r="3" fill="rgba(255,255,255,0.9)"/>
      </svg>
    </div>

    <div id="time-display">
      <span id="time-clock">00:00</span>
      <span id="time-moment">–</span>
    </div>

    <button class="time-btn" id="btn-next" title="Hora siguiente">&#8594;</button>
    <button id="auto-btn" class="active">AUTO</button>
  </div>

<script>
// ═══════════════════════════════════════════════════════
//  PALETAS
// ═══════════════════════════════════════════════════════
const PALETTES = {
  midnight: { bg:'linear-gradient(175deg,#020308 0%,#04060f 20%,#060a18 40%,#08091a 60%,#04060f 80%,#020308 100%)', orb1:'radial-gradient(#0d1540,transparent 70%)', orb2:'radial-gradient(#080e28,transparent 70%)', orb3:'radial-gradient(#101830,transparent 70%)', blob:[50,70,150], logo:[96,144,200], stars:1.0, moon:0.8, sun:0 },
  dawn:     { bg:'linear-gradient(175deg,#ffe8d6 0%,#ffbfa3 18%,#ff9a7a 35%,#c97abe 55%,#8860a8 75%,#4a3680 100%)', orb1:'radial-gradient(#ffb38a,transparent 70%)', orb2:'radial-gradient(#c97abe,transparent 70%)', orb3:'radial-gradient(#ffcba0,transparent 70%)', blob:[255,160,120], logo:[107,42,80], stars:0.3, moon:0.4, sun:0 },
  morning:  { bg:'linear-gradient(175deg,#e8f4fd 0%,#cce8f8 20%,#aad8f5 45%,#c5e8fa 65%,#e2f3fc 82%,#f4faff 100%)', orb1:'radial-gradient(#9dd4ef,transparent 70%)', orb2:'radial-gradient(#bde6f7,transparent 70%)', orb3:'radial-gradient(#daf0fc,transparent 70%)', blob:[175,222,250], logo:[24,73,107], stars:0, moon:0, sun:0.7 },
  midday:   { bg:'linear-gradient(175deg,#ddeeff 0%,#b0d8f8 18%,#7bbeed 40%,#a2d4f5 62%,#d0edfb 82%,#f0f8ff 100%)', orb1:'radial-gradient(#7bbeed,transparent 70%)', orb2:'radial-gradient(#a2d4f5,transparent 70%)', orb3:'radial-gradient(#c4e8f8,transparent 70%)', blob:[140,200,240], logo:[14,58,92], stars:0, moon:0, sun:1.0 },
  afternoon:{ bg:'linear-gradient(175deg,#fef3e2 0%,#fdd89a 20%,#f8b96a 40%,#f09060 60%,#d97050 80%,#b85040 100%)', orb1:'radial-gradient(#f8b96a,transparent 70%)', orb2:'radial-gradient(#d97050,transparent 70%)', orb3:'radial-gradient(#fde0a8,transparent 70%)', blob:[248,185,106], logo:[107,32,16], stars:0, moon:0, sun:0.5 },
  dusk:     { bg:'linear-gradient(175deg,#1a1040 0%,#3d1a5e 18%,#7a2060 38%,#c04040 55%,#e87040 72%,#f0a860 88%,#ffd080 100%)', orb1:'radial-gradient(#c04040,transparent 70%)', orb2:'radial-gradient(#7a2060,transparent 70%)', orb3:'radial-gradient(#e87040,transparent 70%)', blob:[200,100,100], logo:[255,208,128], stars:0.5, moon:0.6, sun:0 },
  night:    { bg:'linear-gradient(175deg,#04060f 0%,#090d22 20%,#0d1535 40%,#101840 60%,#0d1230 80%,#060810 100%)', orb1:'radial-gradient(#1a2a6e,transparent 70%)', orb2:'radial-gradient(#0d1840,transparent 70%)', orb3:'radial-gradient(#152050,transparent 70%)', blob:[80,110,200], logo:[138,180,224], stars:1.0, moon:1.0, sun:0 },
};

// Horas representativas de cada paleta (para interpolación)
const KEYS  = ['midnight','dawn','morning','midday','afternoon','dusk','night','midnight'];
const HOURS = [0, 5.5, 8, 13, 17, 19.5, 22, 24];

// Momentos de tiempo que se mostrarán al navegar con flechas (cada 30 min)
const STEP = 0.5; // horas por click

function lerp(a,b,t){ return a+(b-a)*t; }
function lerpRGB(a,b,t){ return a.map((v,i)=>lerp(v,b[i],t)); }

function getPalette(h) {
  h = ((h % 24) + 24) % 24;
  let i = 0;
  for(let k=0; k<HOURS.length-1; k++){
    if(h>=HOURS[k] && h<HOURS[k+1]){ i=k; break; }
  }
  const t = (h - HOURS[i]) / (HOURS[i+1] - HOURS[i]);
  const A = PALETTES[KEYS[i]], B = PALETTES[KEYS[i+1]];
  return {
    bg:    t < 0.5 ? A.bg : B.bg,
    orb1:  t < 0.5 ? A.orb1 : B.orb1,
    orb2:  t < 0.5 ? A.orb2 : B.orb2,
    orb3:  t < 0.5 ? A.orb3 : B.orb3,
    blob:  lerpRGB(A.blob, B.blob, t),
    logo:  lerpRGB(A.logo, B.logo, t),
    stars: lerp(A.stars, B.stars, t),
    moon:  lerp(A.moon,  B.moon,  t),
    sun:   lerp(A.sun,   B.sun,   t),
  };
}

function momentLabel(h) {
  h = ((h%24)+24)%24;
  if(h>=0  && h<5.5)  return '🌙 Noche';
  if(h>=5.5 && h<8)   return '🌅 Amanecer';
  if(h>=8  && h<13)   return '☀️ Mañana';
  if(h>=13 && h<17)   return '🌤 Mediodía';
  if(h>=17 && h<19.5) return '🌇 Tarde';
  if(h>=19.5 && h<22) return '🌆 Atardecer';
  return '🌙 Noche';
}

function formatClock(h) {
  h = ((h%24)+24)%24;
  const hh = Math.floor(h);
  const mm = Math.floor((h-hh)*60);
  return `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
}

// ── Estado de hora ──────────────────────────────────────────
let autoMode = true;
let currentHour = new Date().getHours() + new Date().getMinutes()/60;

function applyPalette(h) {
  const p = getPalette(h);
  document.body.style.background = p.bg;
  document.getElementById('orb1').style.background = p.orb1;
  document.getElementById('orb2').style.background = p.orb2;
  document.getElementById('orb3').style.background = p.orb3;
  document.getElementById('stars-canvas').style.opacity = p.stars;
  document.getElementById('moon').style.opacity = p.moon;
  document.getElementById('sun').style.opacity  = p.sun;
  const lc = `rgb(${p.logo.map(v=>Math.round(v)).join(',')})`;
  ['svg-sorrymom','svg-twg','svg-brutal'].forEach(id=>{
    document.getElementById(id).style.fill = lc;
  });
  // Actualiza color de blobs para el loop
  window._blobColor = p.blob;

  // Actualiza UI del control
  const norm = (((h%24)+24)%24) / 24;
  const circ = 2 * Math.PI * 17; // circunferencia
  const offset = circ - norm * circ;
  document.getElementById('arc-progress').style.strokeDashoffset = offset;

  // Dot position en el arco
  const angle = norm * Math.PI * 2 - Math.PI/2;
  const dotX = 21 + 17 * Math.cos(angle);
  const dotY = 21 + 17 * Math.sin(angle);
  const dot = document.getElementById('arc-dot');
  dot.setAttribute('cx', dotX.toFixed(2));
  dot.setAttribute('cy', dotY.toFixed(2));

  document.getElementById('time-clock').textContent   = formatClock(h);
  document.getElementById('time-moment').textContent  = momentLabel(h);
}

// Botones
document.getElementById('btn-prev').addEventListener('click', ()=>{
  autoMode = false;
  document.getElementById('auto-btn').classList.remove('active');
  currentHour = ((currentHour - STEP) + 24) % 24;
  applyPalette(currentHour);
});
document.getElementById('btn-next').addEventListener('click', ()=>{
  autoMode = false;
  document.getElementById('auto-btn').classList.remove('active');
  currentHour = (currentHour + STEP) % 24;
  applyPalette(currentHour);
});
document.getElementById('auto-btn').addEventListener('click', ()=>{
  autoMode = !autoMode;
  document.getElementById('auto-btn').classList.toggle('active', autoMode);
  if(autoMode){
    currentHour = new Date().getHours() + new Date().getMinutes()/60;
    applyPalette(currentHour);
  }
});

// Auto: actualiza cada 60s
setInterval(()=>{
  if(autoMode){
    currentHour = new Date().getHours() + new Date().getMinutes()/60;
    applyPalette(currentHour);
  }
}, 60000);

// Aplica inmediatamente
window._blobColor = getPalette(currentHour).blob;
applyPalette(currentHour);

// ── Estrellas ───────────────────────────────────────────
const starsCanvas = document.getElementById('stars-canvas');
const sc = starsCanvas.getContext('2d');
const STARS = Array.from({length:200}, ()=>({
  x: Math.random(), y: Math.random()*0.75,
  r: 0.3+Math.random()*1.3,
  tw: Math.random()*Math.PI*2,
  spd: 0.0007+Math.random()*0.001,
}));
function drawStars(ts){
  sc.clearRect(0,0,starsCanvas.width,starsCanvas.height);
  STARS.forEach(s=>{
    s.tw += s.spd;
    const a = 0.45+0.55*Math.sin(s.tw);
    sc.beginPath();
    sc.arc(s.x*starsCanvas.width, s.y*starsCanvas.height, s.r, 0, Math.PI*2);
    sc.fillStyle=`rgba(255,255,255,${a.toFixed(2)})`;
    sc.fill();
  });
}

// ── Lava lamp ───────────────────────────────────────────
const blobCanvas  = document.getElementById('blob-canvas');
const glassCanvas = document.getElementById('glass-canvas');
const bc = blobCanvas.getContext('2d');
const gc = glassCanvas.getContext('2d');

function resize(){
  blobCanvas.width = glassCanvas.width = starsCanvas.width = window.innerWidth;
  blobCanvas.height = glassCanvas.height = starsCanvas.height = window.innerHeight;
}
resize(); window.addEventListener('resize', resize);

function makeWaves(n,amp){
  const p=[0.031,0.047,0.061,0.073,0.089,0.097,0.113,0.127];
  return Array.from({length:n},(_,i)=>({freq:p[i%p.length]*(0.7+Math.random()*0.6),amp:amp*(0.5+Math.random()*0.5),phase:Math.random()*Math.PI*2}));
}
function makeBlob(xFrac,r,period,offset){
  return { xBase:xFrac,r,period,phaseOffset:offset, xWaves:makeWaves(2,0.055),
    morphWaves:[makeWaves(3,0.28),makeWaves(3,0.18),makeWaves(2,0.11)],
    morphSpeeds:[0.000055,0.000080,0.000120], morphPhases:[0,0,0].map(()=>Math.random()*Math.PI*2) };
}
const blobs=[
  makeBlob(0.18,118,44000,0), makeBlob(0.40,90,36000,9000),
  makeBlob(0.62,145,56000,18000), makeBlob(0.80,72,30000,5000),
  makeBlob(0.30,62,26000,22000), makeBlob(0.90,105,48000,14000),
  makeBlob(0.52,88,40000,3000), makeBlob(0.07,98,52000,31000),
];
function blobState(b,t){
  const W=blobCanvas.width,H=blobCanvas.height;
  const tOff=t+b.phaseOffset, raw=Math.sin((tOff/b.period)*Math.PI*2);
  const eased=Math.sign(raw)*Math.pow(Math.abs(raw),0.65);
  const margin=b.r*1.5, y=margin+(H-margin*2)*(0.5+eased*0.46);
  const velY=Math.abs(Math.cos((tOff/b.period)*Math.PI*2));
  const xd=b.xWaves.reduce((s,w)=>s+w.amp*Math.sin(w.freq*t*0.001+w.phase),0);
  return {x:(b.xBase+xd)*W, y, rx:b.r*(1-velY*0.14), ry:b.r*(1+velY*0.30)};
}
function blobContour(b,cx,cy,rx,ry,N=80){
  b.morphSpeeds.forEach((s,i)=>{ b.morphPhases[i]+=s*16; });
  return Array.from({length:N},(_,i)=>{
    const a=(i/N)*Math.PI*2;
    let dr=0;
    b.morphWaves.forEach((layer,li)=>layer.forEach((w,wi)=>{ dr+=w.amp*Math.sin((li*2+wi+2)*a+b.morphPhases[li]*(wi*0.4+0.8)+w.phase); }));
    return [cx+rx*(1+dr)*Math.cos(a), cy+ry*(1+dr)*Math.sin(a)];
  });
}
function drawSmooth(ctx,pts){
  const N=pts.length; ctx.beginPath(); ctx.moveTo(pts[0][0],pts[0][1]);
  for(let i=0;i<N;i++){
    const p0=pts[(i-1+N)%N],p1=pts[i],p2=pts[(i+1)%N],p3=pts[(i+2)%N];
    ctx.bezierCurveTo(p1[0]+(p2[0]-p0[0])/6,p1[1]+(p2[1]-p0[1])/6,p2[0]-(p3[0]-p1[0])/6,p2[1]-(p3[1]-p1[1])/6,p2[0],p2[1]);
  }
  ctx.closePath();
}
function centroid(pts){ const n=pts.length; return [pts.reduce((s,p)=>s+p[0],0)/n,pts.reduce((s,p)=>s+p[1],0)/n]; }

function animate(ts){
  const W=blobCanvas.width, H=blobCanvas.height;
  const [br,bg2,bb]=window._blobColor||[175,222,250];
  bc.clearRect(0,0,W,H); gc.clearRect(0,0,W,H);
  if(parseFloat(starsCanvas.style.opacity)>0.05) drawStars(ts);
  blobs.forEach(b=>{
    const {x,y,rx,ry}=blobState(b,ts);
    const pts=blobContour(b,x,y,rx,ry);
    const [cx,cy]=centroid(pts);
    drawSmooth(bc,pts); bc.fillStyle=`rgba(${Math.round(br)},${Math.round(bg2)},${Math.round(bb)},0.86)`; bc.fill();
    const g=gc.createRadialGradient(cx-rx*.30,cy-ry*.35,ry*.03,cx,cy,ry*1.12);
    g.addColorStop(0,'rgba(255,255,255,.58)'); g.addColorStop(.25,'rgba(220,240,255,.28)');
    g.addColorStop(.65,'rgba(190,225,250,.12)'); g.addColorStop(1,'rgba(160,210,245,.04)');
    drawSmooth(gc,pts); gc.fillStyle=g; gc.fill();
    drawSmooth(gc,pts); gc.strokeStyle='rgba(255,255,255,.50)'; gc.lineWidth=2; gc.stroke();
    const hp=blobContour({...b,morphPhases:b.morphPhases.map(p=>p+.9)},cx-rx*.24,cy-ry*.30,rx*.36,ry*.26);
    const hg=gc.createRadialGradient(cx-rx*.28,cy-ry*.34,0,cx-rx*.24,cy-ry*.30,rx*.36);
    hg.addColorStop(0,'rgba(255,255,255,.70)'); hg.addColorStop(1,'rgba(255,255,255,0)');
    drawSmooth(gc,hp); gc.fillStyle=hg; gc.fill();
  });
  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);
</script>
