<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta id="meta-theme" name="theme-color" content="#c5e8fa">
<title>Display Oficina</title>
<link rel="shortcut icon" href="../img/favico.ico">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: linear-gradient(175deg,
      #e8f4fd 0%, #cce8f8 20%, #aad8f5 45%,
      #c5e8fa 65%, #e2f3fc 82%, #f4faff 100%);
  }

  /* ── Stars ── */
  #stars-canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    z-index: 0; pointer-events: none;
  }

  /* ── Celestial bodies ── */
  #sun-el, #moon-el {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    z-index: 1;
    will-change: transform, opacity;
  }
  #sun-el {
    width: 90px; height: 90px;
    background: radial-gradient(circle at 40% 40%, #fffbe0 0%, #ffe066 40%, #ffb300 100%);
    box-shadow: 0 0 60px 20px rgba(255,200,40,0.22), 0 0 120px 50px rgba(255,160,0,0.10);
    opacity: 0;
  }
  #moon-el {
    width: 70px; height: 70px;
    background: radial-gradient(circle at 38% 38%, #fffde0 0%, #f5e88a 40%, #e0c840 100%);
    box-shadow: 0 0 40px 12px rgba(240,220,80,0.18), 0 0 80px 30px rgba(240,220,80,0.08);
    opacity: 0;
  }
  #moon-shadow {
    position: absolute; inset: 0;
    border-radius: 50%;
    background: #111;
    transition: clip-path 2s ease;
  }

  /* ── Logo ── */
  .logo-wrap {
    position: absolute;
    pointer-events: none;
    z-index: 3;
  }
  .logo-wrap svg {
    fill: #2c3338;
    filter: drop-shadow(0 3px 18px rgba(44, 51, 56, 0.18));
  }
  .logo-twg { width: 42vw; min-width: 336px; top: 42%; left: 50%; transform: translateX(-50%); animation: fl2 22s ease-in-out infinite; }
  .logo-twg svg { width: 100%; height: auto; }

  @keyframes fl2 {
    0%   { transform:translate(-50%,0) rotate(0deg); }
    25%  { transform:translate(calc(-50% - 36px),28px) rotate(-.5deg); }
    50%  { transform:translate(calc(-50% + 18px),55px) rotate(.3deg); }
    75%  { transform:translate(calc(-50% + 46px),-18px) rotate(.55deg); }
    100% { transform:translate(-50%,0) rotate(0deg); }
  }

  @media (prefers-reduced-motion: reduce) {
    .logo-wrap { animation: none !important; }
  }

  /* ── Metaball layers ── */
  #lava-wrapper-back {
    position: absolute; inset: 0;
    z-index: 2;
    filter: blur(34px) contrast(15);
  }
  #lava-wrapper {
    position: absolute; inset: 0;
    z-index: 5;
    filter: blur(28px) contrast(18);
  }
  #blob-canvas-back, #blob-canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    background: transparent;
  }
  #glass-canvas-back, #glass-canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }
  #glass-canvas-back { z-index: 2; }
  #glass-canvas      { z-index: 6; }

  /* ── Back-home link ── */
  .back-home {
    position: fixed;
    bottom: 14px; right: 16px;
    z-index: 25;
    font-family: system-ui, -apple-system, Segoe UI, sans-serif;
    font-size: 12px;
    letter-spacing: 0.04em;
    color: #18496b;
    text-decoration: none;
    opacity: 0.75;
    pointer-events: auto;
  }
  .back-home:hover { opacity: 1; text-decoration: underline; }
  #info-btn {
    position: fixed;
    bottom: 12px; right: 100px;
    z-index: 25;
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.25);
    background: rgba(255,255,255,0.10);
    color: inherit;
    font-family: 'SF Pro Display','Helvetica Neue','Segoe UI',sans-serif;
    font-size: 12px; font-weight: 600;
    cursor: pointer;
    opacity: 0.5;
    transition: opacity 0.2s, background 0.2s;
    display: flex; align-items: center; justify-content: center;
  }
  #info-btn:hover { opacity: 0.9; background: rgba(255,255,255,0.18); }

  /* ── Info overlay ── */
  #info-overlay {
    position: fixed;
    top: 28px; left: 28px;
    z-index: 28;
    max-width: 340px;
    padding: 20px 24px;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.18);
    background: rgba(0,0,0,0.14);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    font-family: 'SF Pro Display','Helvetica Neue','Segoe UI',sans-serif;
    opacity: 0;
    transform: translateY(-10px);
    transition: opacity 1.2s ease, transform 1.2s ease;
    pointer-events: none;
  }
  #info-overlay.visible {
    opacity: 1;
    transform: translateY(0);
  }
  #info-overlay h3 {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    margin: 0 0 10px;
    opacity: 0.55;
  }
  #info-overlay .info-row {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    line-height: 1.75;
    letter-spacing: 0.02em;
  }
  #info-overlay .info-label { opacity: 0.5; }
  #info-overlay .info-val { font-weight: 500; text-align: right; }
  #info-overlay .info-sep {
    border: none;
    border-top: 1px solid rgba(255,255,255,0.12);
    margin: 10px 0;
  }
  #info-overlay .info-built {
    font-size: 9px;
    line-height: 1.6;
    opacity: 0.38;
    letter-spacing: 0.03em;
  }

  /* ── Time controls (hidden by default) ── */
  #time-controls {
    position: fixed;
    bottom: 0; left: 50%;
    transform: translateX(-50%) translateY(100%);
    z-index: 30;
    display: flex;
    align-items: center;
    gap: 14px;
    background: rgba(0,0,0,0.18);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.22);
    border-radius: 50px 50px 0 0;
    padding: 10px 20px 14px;
    user-select: none;
    transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
  }
  #time-controls.visible {
    transform: translateX(-50%) translateY(0);
  }
  .time-btn {
    width: 34px; height: 34px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.35);
    background: rgba(255,255,255,0.15);
    color: #fff;
    font-size: 15px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, transform 0.15s;
    flex-shrink: 0;
  }
  .time-btn:hover { background: rgba(255,255,255,0.28); transform: scale(1.08); }
  .time-btn:active { transform: scale(0.94); }
  #time-display {
    display: flex; flex-direction: column; align-items: center;
    min-width: 110px;
  }
  #time-clock {
    font-family: 'SF Pro Display','Helvetica Neue','Segoe UI',sans-serif;
    font-size: 20px; font-weight: 300;
    letter-spacing: 0.12em; color: #fff; line-height: 1;
  }
  #time-moment {
    font-family: 'SF Pro Display','Helvetica Neue','Segoe UI',sans-serif;
    font-size: 10px; letter-spacing: 0.18em;
    color: rgba(255,255,255,0.65);
    margin-top: 3px; text-transform: uppercase;
  }
  #time-arc { position: relative; width: 40px; height: 40px; flex-shrink: 0; }
  #time-arc svg { position: absolute; top: 0; left: 0; }
  #auto-btn {
    font-family: 'SF Pro Display','Helvetica Neue',sans-serif;
    font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
    color: rgba(255,255,255,0.55);
    background: none;
    border: 1px solid rgba(255,255,255,0.22);
    border-radius: 20px;
    padding: 4px 10px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  #auto-btn:hover { color: #fff; border-color: rgba(255,255,255,0.5); }
  #auto-btn.active { color: #fff; border-color: rgba(255,255,255,0.6); background: rgba(255,255,255,0.12); }
</style>

<script src="https://cdn.jsdelivr.net/npm/suncalc@1.9.0/suncalc.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════════
//  DISPLAY OFICINA — Ciclo Dia/Noche Astronomico + Lava Lamp
// ═══════════════════════════════════════════════════════════

// ─── Reduced Motion ─────────────────────────────────────────
let motionFactor = 1;
function updateMotionFactor() {
  motionFactor = window.matchMedia('(prefers-reduced-motion: reduce)').matches ? 0.22 : 1;
}
updateMotionFactor();
const mqReduce = window.matchMedia('(prefers-reduced-motion: reduce)');
if (mqReduce.addEventListener) mqReduce.addEventListener('change', updateMotionFactor);
else mqReduce.addListener(updateMotionFactor);

// ═══════════════════════════════════════════════════════════
//  1. GEOLOCALIZACION
// ═══════════════════════════════════════════════════════════
let geoLat = 25.6866, geoLng = -100.3161; // Monterrey default
let geoReady = false;
let geoLocation = ''; // city, country

function setGeo(lat, lng) {
  geoLat = lat; geoLng = lng; geoReady = true;
  localStorage.setItem('display-geo', JSON.stringify({ lat, lng }));
  // Force immediate visual recalculation
  const date = getCurrentDate();
  const astro = getAstroState(date, geoLat, geoLng);
  if (astro) { cachedAstro = astro; applyVisuals(astro, date); }
}

function fetchIPGeo() {
  fetch('https://ipapi.co/json/', { signal: AbortSignal.timeout(5000) })
    .then(r => r.json())
    .then(d => {
      if (d.latitude && d.longitude) {
        setGeo(d.latitude, d.longitude);
        if (d.city || d.country_name) {
          geoLocation = [d.city, d.country_name].filter(Boolean).join(', ');
          localStorage.setItem('display-geo-location', geoLocation);
        }
      }
    })
    .catch(() => {
      fetch('http://ip-api.com/json/?fields=lat,lon,city,country', { signal: AbortSignal.timeout(5000) })
        .then(r => r.json())
        .then(d => {
          if (d.lat && d.lon) {
            setGeo(d.lat, d.lon);
            if (d.city || d.country) {
              geoLocation = [d.city, d.country].filter(Boolean).join(', ');
              localStorage.setItem('display-geo-location', geoLocation);
            }
          }
        })
        .catch(() => { geoReady = true; });
    });
}

function fetchLocationName() {
  if (geoLocation) return;
  fetch('https://ipapi.co/json/', { signal: AbortSignal.timeout(5000) })
    .then(r => r.json())
    .then(d => {
      if (d.city || d.country_name) {
        geoLocation = [d.city, d.country_name].filter(Boolean).join(', ');
        localStorage.setItem('display-geo-location', geoLocation);
      }
    })
    .catch(() => {});
}

(function initGeo() {
  const cached = localStorage.getItem('display-geo');
  if (cached) {
    try {
      const g = JSON.parse(cached);
      geoLat = g.lat; geoLng = g.lng; geoReady = true;
      geoLocation = localStorage.getItem('display-geo-location') || '';
    } catch(e) {}
  }
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      pos => {
        setGeo(pos.coords.latitude, pos.coords.longitude);
        fetchLocationName(); // Always get city/country name
      },
      () => fetchIPGeo(),
      { timeout: 5000 }
    );
  } else {
    fetchIPGeo();
  }
})();

// ═══════════════════════════════════════════════════════════
//  2. SUNCALC INTEGRATION
// ═══════════════════════════════════════════════════════════
function getAstroState(date, lat, lng) {
  if (typeof SunCalc === 'undefined') return null;
  const sunPos = SunCalc.getPosition(date, lat, lng);
  const moonPos = SunCalc.getMoonPosition(date, lat, lng);
  const moonIllum = SunCalc.getMoonIllumination(date);
  return {
    sunAlt:     sunPos.altitude * 180 / Math.PI,
    sunAz:      sunPos.azimuth * 180 / Math.PI,
    moonAlt:    moonPos.altitude * 180 / Math.PI,
    moonAz:     moonPos.azimuth * 180 / Math.PI,
    moonFrac:   moonIllum.fraction,
    moonPhase:  moonIllum.phase,
  };
}

// ═══════════════════════════════════════════════════════════
//  3. MOTOR DE COLOR CONTINUO
// ═══════════════════════════════════════════════════════════
// Keyframes indexados por altitud solar.
// Cada uno define: body gradient (6 stops), blob back/front [r,g,b,a],
// logo [r,g,b], text [r,g,b]

const CK = [
  // Deep night
  { alt: -90,
    bg:[[2,3,8],[4,6,15],[6,10,24],[8,9,26],[4,6,15],[2,3,8]],
    blobB:[40,55,130,0.50], blobF:[50,65,150,0.80],
    logo:[96,144,200], text:[120,160,210] },
  // Astronomical twilight
  { alt: -18,
    bg:[[4,8,22],[10,16,42],[18,24,56],[14,18,48],[8,12,35],[4,6,18]],
    blobB:[45,60,140,0.50], blobF:[55,72,160,0.82],
    logo:[100,150,210], text:[125,165,215] },
  // Nautical twilight
  { alt: -12,
    bg:[[12,15,40],[25,22,60],[40,30,75],[30,24,65],[18,18,50],[10,12,35]],
    blobB:[55,50,130,0.52], blobF:[68,60,150,0.82],
    logo:[120,130,195], text:[140,145,200] },
];

// Dawn/dusk variants at civil twilight and low sun
const CK_DAWN = [
  // Civil twilight — dawn
  { alt: -6,
    bg:[[255,220,200],[255,180,150],[230,130,120],[180,100,160],[120,70,140],[60,40,90]],
    blobB:[200,130,120,0.50], blobF:[220,145,135,0.82],
    logo:[107,42,80], text:[140,60,90] },
  // Horizon — dawn
  { alt: 0,
    bg:[[255,235,210],[255,200,160],[255,170,120],[220,160,140],[180,170,200],[160,190,220]],
    blobB:[220,160,130,0.52], blobF:[235,175,140,0.84],
    logo:[107,52,50], text:[130,60,60] },
  // Golden hour — dawn
  { alt: 10,
    bg:[[250,240,225],[240,225,200],[210,215,220],[190,210,235],[200,225,245],[220,238,250]],
    blobB:[200,195,180,0.52], blobF:[215,210,195,0.84],
    logo:[60,70,90], text:[50,65,85] },
];

const CK_DUSK = [
  // Civil twilight — dusk
  { alt: -6,
    bg:[[60,30,60],[120,40,70],[180,60,65],[210,90,55],[230,130,60],[200,100,50]],
    blobB:[180,80,70,0.50], blobF:[200,95,80,0.82],
    logo:[255,200,128], text:[230,180,120] },
  // Horizon — dusk
  { alt: 0,
    bg:[[30,20,55],[90,35,70],[170,60,60],[220,110,55],[240,160,70],[220,140,55]],
    blobB:[200,100,70,0.52], blobF:[220,115,80,0.84],
    logo:[255,210,140], text:[235,190,130] },
  // Golden hour — dusk
  { alt: 10,
    bg:[[220,235,245],[230,225,215],[240,210,180],[250,200,150],[245,190,130],[235,195,160]],
    blobB:[215,190,160,0.52], blobF:[230,205,170,0.84],
    logo:[90,60,40], text:[80,55,40] },
];

// Daytime (shared dawn/dusk)
const CK_DAY = [
  // Mid sun
  { alt: 30,
    bg:[[232,244,253],[204,232,248],[170,216,245],[197,232,250],[226,243,252],[244,250,255]],
    blobB:[155,210,245,0.55], blobF:[170,222,250,0.86],
    logo:[24,73,107], text:[24,73,107] },
  // High noon
  { alt: 60,
    bg:[[220,238,255],[176,216,248],[123,190,237],[162,212,245],[208,237,251],[240,248,255]],
    blobB:[130,195,238,0.55], blobF:[145,210,248,0.86],
    logo:[14,58,92], text:[14,58,92] },
  // Zenith
  { alt: 90,
    bg:[[210,232,252],[165,210,245],[110,180,232],[150,205,242],[200,230,248],[235,245,254]],
    blobB:[120,185,232,0.55], blobF:[135,200,245,0.86],
    logo:[10,50,85], text:[10,50,85] },
];

function smoothstep(t) { return t * t * (3 - 2 * t); }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function lerpVal(a, b, t) { return a + (b - a) * t; }
function lerpArr(a, b, t) { return a.map((v, i) => lerpVal(v, b[i], t)); }

function interpolateKeys(keys, alt) {
  if (alt <= keys[0].alt) return keys[0];
  if (alt >= keys[keys.length - 1].alt) return keys[keys.length - 1];
  for (let i = 0; i < keys.length - 1; i++) {
    if (alt >= keys[i].alt && alt < keys[i + 1].alt) {
      const raw = (alt - keys[i].alt) / (keys[i + 1].alt - keys[i].alt);
      const t = smoothstep(raw);
      const a = keys[i], b = keys[i + 1];
      return {
        alt,
        bg: a.bg.map((c, j) => lerpArr(c, b.bg[j], t)),
        blobB: lerpArr(a.blobB, b.blobB, t),
        blobF: lerpArr(a.blobF, b.blobF, t),
        logo:  lerpArr(a.logo, b.logo, t),
        text:  lerpArr(a.text, b.text, t),
      };
    }
  }
  return keys[keys.length - 1];
}

function getColors(sunAlt, isDusk) {
  // Night zone (below nautical twilight) — no dawn/dusk distinction
  if (sunAlt <= -12) {
    return interpolateKeys(CK, sunAlt);
  }
  // Twilight + golden hour zone: blend dawn/dusk variants
  if (sunAlt < 15) {
    const dawn = interpolateKeys([...CK.slice(-1), ...CK_DAWN, CK_DAY[0]], sunAlt);
    const dusk = interpolateKeys([...CK.slice(-1), ...CK_DUSK, CK_DAY[0]], sunAlt);
    // Blend based on isDusk with some smoothing
    const duskWeight = isDusk ? 1 : 0;
    return {
      alt: sunAlt,
      bg: dawn.bg.map((c, j) => lerpArr(c, dusk.bg[j], duskWeight)),
      blobB: lerpArr(dawn.blobB, dusk.blobB, duskWeight),
      blobF: lerpArr(dawn.blobF, dusk.blobF, duskWeight),
      logo:  lerpArr(dawn.logo, dusk.logo, duskWeight),
      text:  lerpArr(dawn.text, dusk.text, duskWeight),
    };
  }
  // Full daylight
  return interpolateKeys(CK_DAY, sunAlt);
}

function buildGradient(bgStops) {
  const pcts = [0, 20, 45, 65, 82, 100];
  return 'linear-gradient(175deg,' +
    bgStops.map((c, i) => `rgb(${Math.round(c[0])},${Math.round(c[1])},${Math.round(c[2])}) ${pcts[i]}%`).join(',') + ')';
}

// ═══════════════════════════════════════════════════════════
//  6. SUN & MOON POSITIONING
// ═══════════════════════════════════════════════════════════
const sunEl = document.getElementById('sun-el');
const moonEl = document.getElementById('moon-el');
const moonShadow = document.getElementById('moon-shadow');

function celestialToScreen(az, alt) {
  const x = cssW * 0.5 + (az / 180) * cssW * 0.45;
  const y = cssH * (0.85 - (alt / 90) * 0.80);
  return { x, y };
}

function updateSun(astro) {
  if (astro.sunAlt < -3) {
    sunEl.style.opacity = '0';
    return;
  }
  const opacity = clamp((astro.sunAlt + 3) / 5, 0, 1);
  const { x, y } = celestialToScreen(astro.sunAz, astro.sunAlt);
  const size = 80 + Math.max(0, 15 - Math.abs(astro.sunAlt)) * 2.5;
  const warmth = clamp(1 - astro.sunAlt / 30, 0, 1);
  const r = Math.round(255);
  const g = Math.round(lerpVal(240, 180, warmth));
  const b = Math.round(lerpVal(220, 50, warmth));

  sunEl.style.opacity = opacity;
  sunEl.style.width = sunEl.style.height = size + 'px';
  sunEl.style.transform = `translate(${x - size/2}px, ${y - size/2}px)`;
  sunEl.style.background = `radial-gradient(circle at 40% 40%, #fffbe0 0%, rgb(${r},${g},${Math.round(lerpVal(180,66,warmth))}) 40%, rgb(${r},${Math.round(lerpVal(200,140,warmth))},${Math.round(lerpVal(120,0,warmth))}) 100%)`;
  sunEl.style.boxShadow = `0 0 ${60+warmth*40}px ${20+warmth*15}px rgba(${r},${g},${b},${(0.18+warmth*0.12).toFixed(2)}), 0 0 ${120+warmth*60}px ${50+warmth*30}px rgba(${r},${Math.round(g*0.8)},${Math.round(b*0.3)},0.08)`;
}

function updateMoon(astro) {
  if (astro.moonAlt < -2) {
    moonEl.style.opacity = '0';
    return;
  }
  // Moon visible when above horizon; dimmer during day
  const altOpacity = clamp((astro.moonAlt + 2) / 8, 0, 1);
  const dayDim = clamp(1 - astro.sunAlt / 20, 0.15, 1);
  moonEl.style.opacity = (altOpacity * dayDim * astro.moonFrac).toFixed(2);

  const { x, y } = celestialToScreen(astro.moonAz, astro.moonAlt);
  moonEl.style.transform = `translate(${x - 35}px, ${y - 35}px)`;

  // Moon phase shadow via clip-path
  const phase = astro.moonPhase; // 0=new, 0.25=first quarter, 0.5=full, 0.75=last quarter
  let clipPath;
  if (phase < 0.01 || phase > 0.99) {
    clipPath = 'circle(50% at 50% 50%)'; // new moon — full shadow
  } else if (Math.abs(phase - 0.5) < 0.02) {
    clipPath = 'circle(0% at 50% 50%)'; // full moon — no shadow
  } else if (phase < 0.5) {
    // Waxing: shadow on the left, shrinking
    const shadowWidth = Math.round((1 - phase * 2) * 100);
    clipPath = `inset(0 ${100 - shadowWidth}% 0 0)`;
  } else {
    // Waning: shadow on the right, growing
    const shadowWidth = Math.round((phase - 0.5) * 2 * 100);
    clipPath = `inset(0 0 0 ${100 - shadowWidth}%)`;
  }
  moonShadow.style.clipPath = clipPath;

  const glowSize = 30 + astro.moonFrac * 20;
  moonEl.style.boxShadow = `0 0 ${glowSize}px ${glowSize*0.4}px rgba(240,220,80,${(astro.moonFrac*0.18).toFixed(2)})`;
}

// ═══════════════════════════════════════════════════════════
//  9. LAVA LAMP (blobs)
// ═══════════════════════════════════════════════════════════
function makeWaves(count, baseAmp) {
  const primes = [0.031, 0.047, 0.061, 0.073, 0.089, 0.097, 0.113, 0.127];
  return Array.from({length: count}, (_, i) => ({
    freq:  primes[i % primes.length] * (0.7 + Math.random() * 0.6),
    amp:   baseAmp * (0.5 + Math.random() * 0.5),
    phase: Math.random() * Math.PI * 2,
  }));
}

function makeBlob(xFrac, r, periodMs, phaseOffset) {
  return {
    xBase: xFrac, r, period: periodMs, phaseOffset,
    xWaves: makeWaves(2, 0.068),
    yWaves: makeWaves(2, 0.062),
    morphWaves: [ makeWaves(3, 0.20), makeWaves(2, 0.12), makeWaves(2, 0.065) ],
    morphSpeeds: [0.00018, 0.00028, 0.00038],
    morphPhases: [0, 0, 0].map(() => Math.random() * Math.PI * 2),
    contourSpin: 0.00001 + Math.random() * 0.000018,
    ripplePhase: Math.random() * Math.PI * 2,
    rippleAmp:   0.014 + Math.random() * 0.01,
    roamAmp:  0.055 + Math.random() * 0.05,
    roamPhX:  Math.random() * Math.PI * 2,
    roamPhY:  Math.random() * Math.PI * 2,
    roamVx:   0.00007 + Math.random() * 0.00006,
    roamVy:   0.00006 + Math.random() * 0.000055,
  };
}

const blobs = [
  makeBlob(0.15, 120, 44000,  0),
  makeBlob(0.42,  95, 36000,  9000),
  makeBlob(0.68, 140, 56000, 18000),
  makeBlob(0.85,  75, 30000,  5000),
  makeBlob(0.30,  65, 26000, 22000),
].map((b, i) => ({ ...b, layer: i % 2 === 0 ? 'back' : 'front' }));

function blobState(b, t) {
  const tOff = t + b.phaseOffset;
  const raw = Math.sin((tOff / b.period) * Math.PI * 2);
  const eased = Math.sign(raw) * Math.pow(Math.abs(raw), 0.65);
  const margin = b.r * 1.5;
  const innerH = cssH - margin * 2;
  const xDrift = b.xWaves.reduce((s, w) => s + w.amp * Math.sin(w.freq * t * 0.001 + w.phase), 0) * motionFactor;
  const yDrift = b.yWaves.reduce((s, w) => s + w.amp * Math.sin(w.freq * t * 0.001 + w.phase), 0) * motionFactor;

  let yFrac = 0.5 + eased * 0.34 + yDrift * 0.38;
  yFrac = clamp(yFrac, 0.06, 0.94);
  let y = margin + innerH * yFrac;

  const roamX = Math.sin(t * b.roamVx + b.roamPhX) * b.roamAmp * cssW * motionFactor;
  const roamY = Math.cos(t * b.roamVy + b.roamPhY) * b.roamAmp * cssH * motionFactor;
  let x = (b.xBase + xDrift) * cssW + roamX;
  x = clamp(x, b.r * 0.5, cssW - b.r * 0.5);
  y = clamp(y + roamY * 0.95, margin + b.r * 0.4, cssH - margin - b.r * 0.4);

  // Lava lamp: strong vertical stretch when moving, squeeze when still
  const velY = Math.abs(Math.cos((tOff / b.period) * Math.PI * 2));
  // Direction of movement: positive = rising, negative = sinking
  const dirY = -Math.cos((tOff / b.period) * Math.PI * 2);
  return { x, y, rx: b.r * (1 - velY * 0.14), ry: b.r * (1 + velY * 0.28), velY, dirY };
}

function blobContour(b, cx, cy, rx, ry, t, N = 56, velY = 0, dirY = 0) {
  const phases = b.morphSpeeds.map((spd, i) => b.morphPhases[i] + spd * t * motionFactor);
  const spin = t * b.contourSpin;
  const pts = [];
  for (let i = 0; i < N; i++) {
    const angle = (i / N) * Math.PI * 2;
    const a = angle + spin;
    let dr = 0;
    b.morphWaves.forEach((layer, li) => {
      layer.forEach((w, wi) => {
        const tDrift = t * (0.00006 + li * 0.00004) * (1 + wi * 0.3);
        dr += w.amp * Math.sin((li + wi + 2) * a + phases[li] * (wi * 0.45 + 0.75) + w.phase + tDrift);
      });
    });
    dr += b.rippleAmp * Math.sin(4 * a + t * 0.0001 + b.ripplePhase);

    // Lava lamp teardrop: pointy in direction of travel, bulgy at trailing end
    // cos(angle) = -1 at bottom, +1 at top
    // When rising (dirY>0): pointy top, fat bottom → add to top, subtract from bottom
    // When sinking (dirY<0): pointy bottom, fat top
    const teardrop = dirY * velY * 0.22 * Math.cos(angle);
    // Neck/pinch effect: narrow in the middle when velocity is high
    const pinch = -velY * 0.10 * Math.sin(angle) * Math.sin(angle);

    dr = dr * 0.85 + teardrop + pinch;
    const r = 1 + dr;
    pts.push([ cx + rx * r * Math.cos(angle), cy + ry * r * Math.sin(angle) ]);
  }
  return pts;
}

function drawSmooth(ctx, pts) {
  const N = pts.length;
  ctx.beginPath();
  ctx.moveTo(pts[0][0], pts[0][1]);
  for (let i = 0; i < N; i++) {
    const p0 = pts[(i - 1 + N) % N], p1 = pts[i], p2 = pts[(i + 1) % N], p3 = pts[(i + 2) % N];
    ctx.bezierCurveTo(
      p1[0] + (p2[0] - p0[0]) / 6, p1[1] + (p2[1] - p0[1]) / 6,
      p2[0] - (p3[0] - p1[0]) / 6, p2[1] - (p3[1] - p1[1]) / 6,
      p2[0], p2[1]
    );
  }
  ctx.closePath();
}

function centroid(pts) {
  const n = pts.length;
  return [ pts.reduce((s, p) => s + p[0], 0) / n, pts.reduce((s, p) => s + p[1], 0) / n ];
}

function drawOneBlob(b, ts, bcCtx, gcCtx, isBack) {
  const { x, y, rx, ry, velY, dirY } = blobState(b, ts);
  const pts = blobContour(b, x, y, rx, ry, ts, 56, velY, dirY);

  const [br, bg, bb, ba] = isBack ? cachedBlobB : cachedBlobF;
  drawSmooth(bcCtx, pts);
  bcCtx.fillStyle = `rgba(${Math.round(br)},${Math.round(bg)},${Math.round(bb)},${ba})`;
  bcCtx.fill();

  const [cx, cy] = centroid(pts);
  const grad = gcCtx.createRadialGradient(cx - rx * 0.30, cy - ry * 0.35, ry * 0.03, cx, cy, ry * 1.12);
  if (isBack) {
    grad.addColorStop(0, 'rgba(255,255,255,0.38)');
    grad.addColorStop(0.3, 'rgba(210,236,252,0.20)');
    grad.addColorStop(0.7, 'rgba(175,220,245,0.10)');
    grad.addColorStop(1, 'rgba(150,205,235,0.03)');
  } else {
    grad.addColorStop(0, 'rgba(255,255,255,0.60)');
    grad.addColorStop(0.25, 'rgba(225,244,255,0.32)');
    grad.addColorStop(0.65, 'rgba(195,234,252,0.14)');
    grad.addColorStop(1, 'rgba(165,218,248,0.04)');
  }
  drawSmooth(gcCtx, pts); gcCtx.fillStyle = grad; gcCtx.fill();
  drawSmooth(gcCtx, pts);
  gcCtx.strokeStyle = isBack ? 'rgba(255,255,255,0.32)' : 'rgba(255,255,255,0.55)';
  gcCtx.lineWidth = isBack ? 1.35 : 2;
  gcCtx.stroke();

  const hlPts = blobContour(
    { ...b, morphPhases: b.morphPhases.map(p => p + 0.9) },
    cx - rx * 0.24, cy - ry * 0.30, rx * 0.36, ry * 0.26, ts
  );
  const hlGrad = gcCtx.createRadialGradient(cx - rx * 0.28, cy - ry * 0.34, 0, cx - rx * 0.24, cy - ry * 0.30, rx * 0.36);
  hlGrad.addColorStop(0, isBack ? 'rgba(255,255,255,0.42)' : 'rgba(255,255,255,0.72)');
  hlGrad.addColorStop(1, 'rgba(255,255,255,0.00)');
  drawSmooth(gcCtx, hlPts); gcCtx.fillStyle = hlGrad; gcCtx.fill();
}

// ═══════════════════════════════════════════════════════════
//  10. MAIN LOOP
// ═══════════════════════════════════════════════════════════
let cachedAstro = null;
let lastAstroUpdate = 0;

// Apply initial visuals immediately
{
  const initDate = new Date();
  const initAstro = getAstroState(initDate, geoLat, geoLng);
  if (initAstro) {
    cachedAstro = initAstro;
    applyVisuals(initAstro, initDate);
  }
}

function animate(ts) {
  if (document.hidden) { requestAnimationFrame(animate); return; }

  // Update astro state once per second
  if (ts - lastAstroUpdate > 1000) {
    const date = getCurrentDate();
    const astro = getAstroState(date, geoLat, geoLng);
    if (astro) {
      cachedAstro = astro;
      applyVisuals(astro, date);
    }
    lastAstroUpdate = ts;
  }

  // Stars
  if (starsOpacity > 0.01) drawStars(ts);
  else sc.clearRect(0, 0, cssW, cssH);

  // Blobs
  bcB.clearRect(0, 0, cssW, cssH);
  gcB.clearRect(0, 0, cssW, cssH);
  bc.clearRect(0, 0, cssW, cssH);
  gc.clearRect(0, 0, cssW, cssH);

  blobs.forEach(b => { if (b.layer === 'back') drawOneBlob(b, ts, bcB, gcB, true); });
  blobs.forEach(b => { if (b.layer === 'front') drawOneBlob(b, ts, bc, gc, false); });

  requestAnimationFrame(animate);
}

requestAnimationFrame(animate);

const infoOverlay = document.getElementById('info-overlay');

const infoBuilt   = document.getElementById('info-built');
const INFO_INTERVAL = 15 * 60 * 1000;
const INFO_DURATION = 25 * 1000;
const pageStart = Date.now();

function fmtDeg(v) { return (v >= 0 ? '+' : '') + v.toFixed(1) + '\u00B0'; }
function fmtAz(v) {
  const dir = v < -135 || v > 135 ? 'N' : v < -45 ? 'E' : v < 45 ? 'S' : 'W';
  return ((v + 360) % 360).toFixed(1) + '\u00B0 ' + dir;
}

function moonPhaseName(p) {
  if (p < 0.03) return 'Nueva';
  if (p < 0.22) return 'Creciente';
  if (p < 0.28) return 'Cuarto creciente';
  if (p < 0.47) return 'Gibosa creciente';
  if (p < 0.53) return 'Llena';
  if (p < 0.72) return 'Gibosa menguante';
  if (p < 0.78) return 'Cuarto menguante';
  if (p < 0.97) return 'Menguante';
  return 'Nueva';
}

function showInfoOverlay() {
  if (!cachedAstro || typeof SunCalc === 'undefined') return;

  const date = getCurrentDate();
  const times = SunCalc.getTimes(date, geoLat, geoLng);
  const isDusk = cachedAstro.sunAz > 0;
  const uptime = Math.floor((Date.now() - pageStart) / 60000);

  const row = (label, val) => `<div class="info-row"><span class="info-label">${label}</span><span class="info-val">${val}</span></div>`;

  infoAstro.innerHTML =
    row('Sol altitud', fmtDeg(cachedAstro.sunAlt)) +
    row('Sol azimut', fmtAz(cachedAstro.sunAz)) +
    row('Amanecer', times.sunrise ? times.sunrise.toLocaleTimeString('es', {hour:'2-digit',minute:'2-digit',hour12:false}) : '--') +
    row('Atardecer', times.sunset ? times.sunset.toLocaleTimeString('es', {hour:'2-digit',minute:'2-digit',hour12:false}) : '--') +
    row('Luna altitud', fmtDeg(cachedAstro.moonAlt)) +
    row('Fase lunar', moonPhaseName(cachedAstro.moonPhase)) +
    row('Iluminacion', Math.round(cachedAstro.moonFrac * 100) + '%') +
    row('Ubicacion', geoLocation || (geoLat.toFixed(2) + ', ' + geoLng.toFixed(2))) +
    row('Momento', getMomentLabel(cachedAstro.sunAlt, isDusk)) +
    row('Uptime', uptime + ' min');

  infoBuilt.innerHTML =
    'SunCalc.js — posiciones astronomicas en tiempo real<br>' +
    'Canvas metaballs (blur + contrast) con Catmull-Rom<br>' +
    blobs.length + ' blobs, ' + STARS.length + ' estrellas, ' + Math.round(window.devicePixelRatio * 100) / 100 + 'x DPR<br>' +
    'Paleta continua derivada de altitud solar con smoothstep';

  // Adapt text color: light for dark backgrounds, dark for light
  const isNight = cachedAstro.sunAlt < -6;
  const textColor = isNight ? 'rgba(255,255,255,0.95)' : 'rgba(0,0,0,0.88)';
  const labelColor = isNight ? 'rgba(255,255,255,0.60)' : 'rgba(0,0,0,0.55)';
  const borderColor = isNight ? 'rgba(255,255,255,0.22)' : 'rgba(0,0,0,0.14)';
  const bgColor = isNight ? 'rgba(0,0,0,0.38)' : 'rgba(255,255,255,0.42)';

  infoOverlay.style.color = textColor;
  infoOverlay.style.borderColor = borderColor;
  infoOverlay.style.background = bgColor;
  infoOverlay.querySelectorAll('.info-label, h3').forEach(el => el.style.color = labelColor);
  infoOverlay.querySelector('.info-sep').style.borderColor = borderColor;
  infoOverlay.querySelector('.info-built').style.color = labelColor;

  infoOverlay.classList.add('visible');
  setTimeout(() => infoOverlay.classList.remove('visible'), INFO_DURATION);
}

// First appearance after 10 seconds, then every 15 minutes
setTimeout(showInfoOverlay, 10000);
setInterval(showInfoOverlay, INFO_INTERVAL);

// Manual trigger button
document.getElementById('info-btn').addEventListener('click', () => {
  infoOverlay.classList.remove('visible');
  setTimeout(showInfoOverlay, 50);
});
</script>
</body>
</html>
