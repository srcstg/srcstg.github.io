<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#c5e8fa">
<title>Display Oficina</title>
<link rel="shortcut icon" href="../img/favico.ico">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: linear-gradient(175deg,
      #e8f4fd 0%,
      #cce8f8 20%,
      #aad8f5 45%,
      #c5e8fa 65%,
      #e2f3fc 82%,
      #f4faff 100%
    );
  }

  .orb {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    filter: blur(100px);
    opacity: 0.45;
  }
  .orb-1 { width:800px; height:800px; background:radial-gradient(#9dd4ef,transparent 70%); top:-250px; left:-200px; animation: od1 30s ease-in-out infinite; }
  .orb-2 { width:600px; height:600px; background:radial-gradient(#bde6f7,transparent 70%); bottom:-150px; right:-150px; animation: od2 38s ease-in-out infinite; }
  .orb-3 { width:450px; height:450px; background:radial-gradient(#daf0fc,transparent 70%); top:38%; left:42%; animation: od3 24s ease-in-out infinite; }
  @keyframes od1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(90px,70px)} }
  @keyframes od2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-80px,-60px)} }
  @keyframes od3 { 0%,100%{transform:translate(0,0)} 33%{transform:translate(55px,-45px)} 66%{transform:translate(-45px,55px)} }

  /* Logos debajo de las formas (lava + vidrio); el enlace .back-home sigue encima */
  .logo-wrap {
    position: absolute;
    pointer-events: none;
    z-index: 3;
  }
  .logo-wrap svg {
    fill: #2c3338;
    filter: drop-shadow(0 3px 18px rgba(44, 51, 56, 0.18));
  }

  .logo-sorrymom { width: 320px; top: 14%; left:  7%; animation: fl1 18s ease-in-out infinite; }
  .logo-sorrymom svg { width: 100%; }
  .logo-twg      { width: 260px; top: 52%; left: 56%; animation: fl2 22s ease-in-out infinite; }
  .logo-twg svg  { width: 100%; }
  .logo-brutal   { width: 360px; top: 70%; left: 10%; animation: fl3 26s ease-in-out infinite; }
  .logo-brutal img {
    width: 100%;
    height: auto;
    display: block;
    filter: drop-shadow(0 3px 18px rgba(44, 51, 56, 0.18));
  }

  @keyframes fl1 {
    0%   { transform:translate(0,0) rotate(0deg); }
    20%  { transform:translate(28px,-22px) rotate(.4deg); }
    40%  { transform:translate(50px,12px) rotate(-.3deg); }
    60%  { transform:translate(18px,36px) rotate(.45deg); }
    80%  { transform:translate(-18px,8px) rotate(-.2deg); }
    100% { transform:translate(0,0) rotate(0deg); }
  }
  @keyframes fl2 {
    0%   { transform:translate(0,0) rotate(0deg); }
    25%  { transform:translate(-36px,28px) rotate(-.5deg); }
    50%  { transform:translate(18px,55px) rotate(.3deg); }
    75%  { transform:translate(46px,-18px) rotate(.55deg); }
    100% { transform:translate(0,0) rotate(0deg); }
  }
  @keyframes fl3 {
    0%   { transform:translate(0,0) rotate(0deg); }
    30%  { transform:translate(42px,-28px) rotate(.28deg); }
    55%  { transform:translate(-22px,-46px) rotate(-.4deg); }
    80%  { transform:translate(28px,18px) rotate(.18deg); }
    100% { transform:translate(0,0) rotate(0deg); }
  }

  @media (prefers-reduced-motion: reduce) {
    .orb { animation: none !important; }
    .logo-wrap { animation: none !important; }
  }

  /* Metaball: capa detrás (más suave) y delante */
  #lava-wrapper-back {
    position: absolute;
    inset: 0;
    z-index: 2;
    filter: blur(34px) contrast(15);
  }
  #lava-wrapper {
    position: absolute;
    inset: 0;
    z-index: 5;
    filter: blur(28px) contrast(18);
  }

  #blob-canvas-back,
  #blob-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    background: transparent;
  }

  #glass-canvas-back,
  #glass-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }
  #glass-canvas-back { z-index: 2; }
  #glass-canvas { z-index: 6; }

  .back-home {
    position: fixed;
    bottom: 14px;
    right: 16px;
    z-index: 20;
    font-family: system-ui, -apple-system, Segoe UI, sans-serif;
    font-size: 12px;
    letter-spacing: 0.04em;
    color: #18496b;
    text-decoration: none;
    opacity: 0.75;
    pointer-events: auto;
  }
  .back-home:hover { opacity: 1; text-decoration: underline; }
</style>

<script>
// ═══════════════════════════════════════════════════════════
//  LAVA LAMP — morfología en continuo cambio (metaballs + vidrio)
//  Técnica: canvas blur+contrast (metaball fusion) + glass overlay
// ═══════════════════════════════════════════════════════════

let motionFactor = 1;
function updateMotionFactor() {
  motionFactor = window.matchMedia('(prefers-reduced-motion: reduce)').matches ? 0.22 : 1;
}
updateMotionFactor();
const mqReduce = window.matchMedia('(prefers-reduced-motion: reduce)');
if (mqReduce.addEventListener) mqReduce.addEventListener('change', updateMotionFactor);
else mqReduce.addListener(updateMotionFactor);

const blobCanvas     = document.getElementById('blob-canvas');
const glassCanvas    = document.getElementById('glass-canvas');
const blobCanvasBack = document.getElementById('blob-canvas-back');
const glassCanvasBack = document.getElementById('glass-canvas-back');
const bc  = blobCanvas.getContext('2d');
const gc  = glassCanvas.getContext('2d');
const bcB = blobCanvasBack.getContext('2d');
const gcB = glassCanvasBack.getContext('2d');

function resize() {
  const w = window.innerWidth;
  const h = window.innerHeight;
  blobCanvas.width = glassCanvas.width = w;
  blobCanvas.height = glassCanvas.height = h;
  blobCanvasBack.width = glassCanvasBack.width = w;
  blobCanvasBack.height = glassCanvasBack.height = h;
}
resize();
window.addEventListener('resize', resize);

// ─── Noise suave: suma de sinusoides con frecuencias primas ───
// Simula la deformación viscosa del aceite.
// Cada "tentáculo" del blob es una combinación de 5-6 ondas
// con períodos largos (8-40 seg) que mutan lentamente.

function noise1D(t, waves) {
  // waves: [{freq, amp, phase}]
  return waves.reduce((s, w) => s + w.amp * Math.sin(w.freq * t + w.phase), 0);
}

// Genera juego de ondas aleatorio para morfología
function makeWaves(count, baseAmp) {
  const primes = [0.031, 0.047, 0.061, 0.073, 0.089, 0.097, 0.113, 0.127];
  return Array.from({length: count}, (_, i) => ({
    freq:  primes[i % primes.length] * (0.7 + Math.random() * 0.6),
    amp:   baseAmp * (0.5 + Math.random() * 0.5),
    phase: Math.random() * Math.PI * 2,
  }));
}

// ─── Definición de blobs ────────────────────────────────────
// period: tiempo en ms para un ciclo vertical completo (muy lento)
// xWaves: ondas que controlan la deriva horizontal
// morphWaves: ondas que deforman el contorno (muchas, lentas)

function makeBlob(xFrac, r, periodMs, phaseOffset) {
  return {
    xBase:       xFrac,
    r,
    period:      periodMs,
    phaseOffset,

    xWaves: makeWaves(2, 0.068),
    yWaves: makeWaves(2, 0.062),

    // Pocas capas y amplitudes bajas → siluetas más cercanas al círculo/elipse
    morphWaves: [
      makeWaves(2, 0.14),
      makeWaves(2, 0.085),
      makeWaves(2, 0.048),
    ],

    morphSpeeds: [0.00016, 0.00024, 0.00034],
    morphPhases: [0, 0, 0].map(() => Math.random() * Math.PI * 2),

    contourSpin: 0.00001 + Math.random() * 0.000018,
    ripplePhase: Math.random() * Math.PI * 2,
    rippleAmp:   0.014 + Math.random() * 0.01,

    // Recorrido lento por la pantalla (fracción ~0.06–0.11 del ancho/alto)
    roamAmp:  0.055 + Math.random() * 0.05,
    roamPhX:  Math.random() * Math.PI * 2,
    roamPhY:  Math.random() * Math.PI * 2,
    roamVx:   0.00007 + Math.random() * 0.00006,
    roamVy:   0.00006 + Math.random() * 0.000055,
  };
}

const blobs = [
  makeBlob(0.18, 118, 44000,  0),
  makeBlob(0.40,  90, 36000,  9000),
  makeBlob(0.62, 145, 56000, 18000),
  makeBlob(0.80,  72, 30000,  5000),
  makeBlob(0.30,  62, 26000, 22000),
  makeBlob(0.90, 105, 48000, 14000),
  makeBlob(0.52,  88, 40000,  3000),
  makeBlob(0.07,  98, 52000, 31000),
].map((b, i) => ({ ...b, layer: i % 2 === 0 ? 'back' : 'front' }));

// ─── Posición y radios en un instante ───────────────────────
function blobState(b, t, W, H) {

  // Ciclo vertical: seno muy lento con easing para que tarde más en los extremos
  const tOff   = t + b.phaseOffset;
  const raw    = Math.sin((tOff / b.period) * Math.PI * 2);
  // Power easing: pasa rápido por el centro, lento en extremos
  const eased  = Math.sign(raw) * Math.pow(Math.abs(raw), 0.65);

  const margin = b.r * 1.5;
  const innerH = H - margin * 2;

  const xDrift = b.xWaves.reduce((s, w) => s + w.amp * Math.sin(w.freq * t * 0.001 + w.phase), 0) * motionFactor;
  const yDrift = b.yWaves.reduce((s, w) => s + w.amp * Math.sin(w.freq * t * 0.001 + w.phase), 0) * motionFactor;

  // Lava + deriva vertical amplia
  let yFrac = 0.5 + eased * 0.34 + yDrift * 0.38;
  yFrac = Math.max(0.06, Math.min(0.94, yFrac));
  let y = margin + innerH * yFrac;

  const roamX = Math.sin(t * b.roamVx + b.roamPhX) * b.roamAmp * W * motionFactor;
  const roamY = Math.cos(t * b.roamVy + b.roamPhY) * b.roamAmp * H * motionFactor;
  let x = (b.xBase + xDrift) * W + roamX;
  x = Math.max(b.r * 0.5, Math.min(W - b.r * 0.5, x));

  y += roamY * 0.95;
  y = Math.max(margin + b.r * 0.4, Math.min(H - margin - b.r * 0.4, y));

  const velY = Math.abs(Math.cos((tOff / b.period) * Math.PI * 2));

  const stretch = 1 + velY * 0.08;
  const squeeze = 1 - velY * 0.04;
  const ry = b.r * stretch;
  const rx = b.r * squeeze;

  return { x, y, rx, ry, velY };
}

// ─── Contorno orgánico del blob ─────────────────────────────
// Deformación suave (casi redonda) + ripple bajo en frecuencia angular
function blobContour(b, cx, cy, rx, ry, t, N = 88) {
  b.morphSpeeds.forEach((spd, i) => {
    b.morphPhases[i] += spd * 16 * motionFactor;
  });

  const spin = t * b.contourSpin;
  const pts = [];
  for (let i = 0; i < N; i++) {
    const angle = (i / N) * Math.PI * 2;
    const a = angle + spin;

    let dr = 0;
    b.morphWaves.forEach((layer, li) => {
      layer.forEach((w, wi) => {
        const angFreq = li + wi + 2;
        const tDrift = t * (0.00006 + li * 0.00004) * (1 + wi * 0.3);
        dr += w.amp * Math.sin(
          angFreq * a + b.morphPhases[li] * (wi * 0.45 + 0.75) + w.phase + tDrift
        );
      });
    });

    dr += b.rippleAmp * Math.sin(4 * a + t * 0.0001 + b.ripplePhase);

    dr *= 0.78;
    const r = 1 + dr;
    pts.push([
      cx + rx * r * Math.cos(angle),
      cy + ry * r * Math.sin(angle),
    ]);
  }
  return pts;
}

// ─── Catmull-Rom suavizado → canvas path ────────────────────
function drawSmooth(ctx, pts) {
  const N = pts.length;
  ctx.beginPath();
  ctx.moveTo(pts[0][0], pts[0][1]);
  for (let i = 0; i < N; i++) {
    const p0 = pts[(i - 1 + N) % N];
    const p1 = pts[i];
    const p2 = pts[(i + 1) % N];
    const p3 = pts[(i + 2) % N];
    const cp1x = p1[0] + (p2[0] - p0[0]) / 6;
    const cp1y = p1[1] + (p2[1] - p0[1]) / 6;
    const cp2x = p2[0] - (p3[0] - p1[0]) / 6;
    const cp2y = p2[1] - (p3[1] - p1[1]) / 6;
    ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, p2[0], p2[1]);
  }
  ctx.closePath();
}

// ─── Centroide ───────────────────────────────────────────────
function centroid(pts) {
  const n = pts.length;
  return [
    pts.reduce((s, p) => s + p[0], 0) / n,
    pts.reduce((s, p) => s + p[1], 0) / n,
  ];
}

function drawOneBlob(b, ts, W, H, bcCtx, gcCtx, isBack) {
  const { x, y, rx, ry } = blobState(b, ts, W, H);
  const pts = blobContour(b, x, y, rx, ry, ts);

  drawSmooth(bcCtx, pts);
  bcCtx.fillStyle = isBack
    ? 'rgba(165, 215, 248, 0.58)'
    : 'rgba(175, 222, 250, 0.86)';
  bcCtx.fill();

  const [cx, cy] = centroid(pts);

  const grad = gcCtx.createRadialGradient(
    cx - rx * 0.30, cy - ry * 0.35, ry * 0.03,
    cx, cy, ry * 1.12
  );
  if (isBack) {
    grad.addColorStop(0,    'rgba(255,255,255, 0.38)');
    grad.addColorStop(0.3,  'rgba(210, 236, 252, 0.20)');
    grad.addColorStop(0.7,  'rgba(175, 220, 245, 0.10)');
    grad.addColorStop(1,    'rgba(150, 205, 235, 0.03)');
  } else {
    grad.addColorStop(0,    'rgba(255,255,255, 0.60)');
    grad.addColorStop(0.25, 'rgba(225,244,255, 0.32)');
    grad.addColorStop(0.65, 'rgba(195,234,252, 0.14)');
    grad.addColorStop(1,    'rgba(165,218,248, 0.04)');
  }

  drawSmooth(gcCtx, pts);
  gcCtx.fillStyle = grad;
  gcCtx.fill();

  drawSmooth(gcCtx, pts);
  gcCtx.strokeStyle = isBack ? 'rgba(255,255,255, 0.32)' : 'rgba(255,255,255, 0.55)';
  gcCtx.lineWidth = isBack ? 1.35 : 2;
  gcCtx.stroke();

  const hlPts = blobContour(
    { ...b, morphPhases: b.morphPhases.map(p => p + 0.9) },
    cx - rx * 0.24, cy - ry * 0.30,
    rx * 0.36, ry * 0.26,
    ts
  );
  const hlGrad = gcCtx.createRadialGradient(
    cx - rx * 0.28, cy - ry * 0.34, 0,
    cx - rx * 0.24, cy - ry * 0.30,
    rx * 0.36
  );
  hlGrad.addColorStop(0, isBack ? 'rgba(255,255,255,0.42)' : 'rgba(255,255,255,0.72)');
  hlGrad.addColorStop(1, 'rgba(255,255,255,0.00)');
  drawSmooth(gcCtx, hlPts);
  gcCtx.fillStyle = hlGrad;
  gcCtx.fill();
}

// ─── Loop ────────────────────────────────────────────────────
function animate(ts) {
  if (document.hidden) {
    requestAnimationFrame(animate);
    return;
  }

  const W = blobCanvas.width;
  const H = blobCanvas.height;

  bcB.clearRect(0, 0, W, H);
  gcB.clearRect(0, 0, W, H);
  bc.clearRect(0, 0, W, H);
  gc.clearRect(0, 0, W, H);

  blobs.forEach(b => {
    if (b.layer === 'back') {
      drawOneBlob(b, ts, W, H, bcB, gcB, true);
    }
  });
  blobs.forEach(b => {
    if (b.layer === 'front') {
      drawOneBlob(b, ts, W, H, bc, gc, false);
    }
  });

  requestAnimationFrame(animate);
}

requestAnimationFrame(animate);
</script>
</body>
</html>
