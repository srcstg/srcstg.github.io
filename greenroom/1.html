<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>GREENROOM — Showcase · Invitación</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="showcase-header-logo.css" />
  <style>
    :root {
      --black: #000000;
      --white: #ffffff;
      --grey-bg: #f2f2f2;
      --grey-muted: #888888;
      --blue-link: #00bfff;
      --radius-phone: 40px;
      --radius-input: 12px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Inter, system-ui, sans-serif;
      background: #e8e8ea;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .device {
      width: 100%;
      max-width: 390px;
      min-height: min(844px, 92vh);
      background: var(--white);
      border-radius: var(--radius-phone);
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.12);
      display: flex;
      flex-direction: column;
      position: relative;
      opacity: 0;
      animation: screenEnter 0.55s ease forwards;
    }

    @keyframes screenEnter {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 48px 28px 32px;
      text-align: center;
    }

    .logo {
      margin-bottom: auto;
      padding-top: 8px;
      line-height: 0;
    }

    .logo-mark--on-light img {
      filter: brightness(0);
    }

    .hint {
      font-size: 1rem;
      font-weight: 400;
      color: var(--black);
      line-height: 1.45;
      margin-bottom: 36px;
    }

    .code-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-bottom: auto;
      flex-wrap: nowrap;
      padding: 8px 4px;
    }

    .digit {
      --digit-spring: cubic-bezier(0.34, 1.56, 0.52, 1.12);
      width: 52px;
      height: 64px;
      border: none;
      border-radius: var(--radius-input);
      background: var(--grey-bg);
      font-size: 1.5rem;
      font-weight: 600;
      text-align: center;
      font-variant-numeric: tabular-nums;
      color: var(--black);
      outline: none;
      position: relative;
      z-index: 1;
      transition:
        transform 0.58s var(--digit-spring),
        opacity 0.45s ease,
        box-shadow 0.5s var(--digit-spring),
        filter 0.4s ease,
        font-size 0.45s var(--digit-spring);
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
    }

    .code-row.is-editing-code .digit {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .code-row.is-editing-code.has-active-digit .digit:not(:focus) {
      opacity: 0.68;
      transform: translateY(1px) scale(0.76);
      filter: brightness(0.94);
    }

    .code-row.is-editing-code .digit:focus {
      z-index: 3;
      font-size: 1.68rem;
      box-shadow:
        0 0 0 3px var(--black),
        0 10px 28px rgba(0, 0, 0, 0.18),
        0 3px 12px rgba(0, 0, 0, 0.12);
      transform: translateY(-3px) scale(1.24);
      filter: brightness(1.02);
    }

    .digit:focus {
      box-shadow: 0 0 0 2px var(--black);
      transform: scale(1.04);
    }

    .footer-hint {
      font-size: 0.8125rem;
      color: var(--grey-muted);
      margin-top: 48px;
    }

    .footer-hint a.apply {
      color: var(--blue-link);
      text-decoration: none;
      font-weight: 500;
    }

    .footer-hint a.apply:hover {
      text-decoration: underline;
    }

    .nav-showcase {
      position: absolute;
      bottom: 12px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 11px;
      color: #aaa;
    }

    .nav-showcase a {
      color: #666;
      margin: 0 6px;
    }

    .cta-row {
      margin-top: 28px;
    }

    .btn-primary {
      width: 100%;
      padding: 16px 24px;
      border: none;
      border-radius: 999px;
      background: var(--black);
      color: var(--white);
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .btn-primary:hover {
      transform: scale(1.01);
      opacity: 0.92;
    }

    .btn-primary:active {
      transform: scale(0.99);
    }
  </style>
</head>
<body>
  <div class="device" id="device">
    <div class="screen">
      <div class="logo logo-mark logo-mark--on-light">
        <img
          src="https://i.ibb.co/7xKHDKCr/1774198653897.png"
          alt="GREENROOM"
          width="200"
          height="48"
          decoding="async"
        />
      </div>
      <p class="hint">Ingresa tu código<br />de invitación</p>
      <div class="code-row" role="group" aria-label="Código de invitación">
        <input class="digit" type="text" inputmode="numeric" maxlength="1" autocomplete="one-time-code" aria-label="Dígito 1" />
        <input class="digit" type="text" inputmode="numeric" maxlength="1" autocomplete="one-time-code" aria-label="Dígito 2" />
        <input class="digit" type="text" inputmode="numeric" maxlength="1" autocomplete="one-time-code" aria-label="Dígito 3" />
        <input class="digit" type="text" inputmode="numeric" maxlength="1" autocomplete="one-time-code" aria-label="Dígito 4" />
      </div>
      <div class="cta-row">
        <a href="2.html" class="btn-primary" style="display: block; text-decoration: none; text-align: center">Continuar</a>
      </div>
      <p class="footer-hint">¿No tienes código? <a class="apply" href="#">Aplicar</a></p>
    </div>
    <div class="nav-showcase">
      <span>1 · Invitación</span>
      <a href="1.1.html">1.1</a>
      <a href="2.html">2 →</a>
    </div>
  </div>
  <script>
    const inputs = document.querySelectorAll(".digit");
    const codeRow = document.querySelector(".code-row");

    codeRow?.addEventListener("focusin", () => {
      codeRow.classList.add("is-editing-code", "has-active-digit");
    });
    codeRow?.addEventListener("focusout", () => {
      requestAnimationFrame(() => {
        if (!codeRow.contains(document.activeElement)) codeRow.classList.remove("has-active-digit");
      });
    });

    inputs.forEach((input, i) => {
      input.addEventListener("input", () => {
        if (input.value && i < inputs.length - 1) inputs[i + 1].focus();
      });
      input.addEventListener("keydown", (e) => {
        if (e.key === "Backspace" && !input.value && i > 0) inputs[i - 1].focus();
      });
    });
  </script>
</body>
</html>
