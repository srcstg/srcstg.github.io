<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>GREENROOM — Showcase · Chat</title>
  <link href="https://fonts.cdnfonts.com/css/switzer" rel="stylesheet" />
  <link rel="stylesheet" href="showcase-bottom-nav-active.css" />
  <style>
    :root {
      --page-bg: #1c1c1c;
      --surface: #222222;
      --white: #ffffff;
      --text: #f0f0f0;
      --text-muted: #9a9a9a;
      --grey-line: rgba(255, 255, 255, 0.1);
      --bubble-in: rgba(255, 255, 255, 0.08);
      --radius-phone: 40px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Switzer", system-ui, -apple-system, sans-serif;
      background: var(--page-bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    .device {
      width: 100%;
      max-width: 390px;
      height: min(844px, 92vh);
      max-height: min(844px, 92vh);
      background: var(--surface);
      border-radius: var(--radius-phone);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .chat-reveal {
      animation: chatReveal 0.62s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes chatReveal {
      from {
        opacity: 0;
        transform: translate3d(36px, 0, 0) scale(0.96);
        filter: blur(12px);
      }
      to {
        opacity: 1;
        transform: none;
        filter: none;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .chat-reveal {
        animation: none;
      }
    }

    @supports (view-transition-name: none) {
      ::view-transition-old(root) {
        animation: vtFadeOut 0.22s ease forwards;
      }

      ::view-transition-new(root) {
        animation: chatReveal 0.58s cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      @keyframes vtFadeOut {
        to {
          opacity: 0.65;
          filter: blur(6px);
        }
      }
    }

    .chat-header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 14px 18px;
      min-height: 64px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      background: var(--surface);
      z-index: 6;
    }

    .chat-back {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      color: var(--text);
      border-radius: 50%;
      text-decoration: none;
    }

    .chat-back:hover {
      background: rgba(255, 255, 255, 0.06);
    }

    .chat-peer-avatar {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      object-fit: cover;
      flex-shrink: 0;
    }

    .chat-peer-text {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      padding-top: 1px;
    }

    .chat-peer-name {
      font-size: 0.9375rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.35;
    }

    .chat-peer-sub {
      font-size: 0.6875rem;
      color: var(--text-muted);
      line-height: 1.4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-more {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      border: none;
      background: transparent;
      color: var(--text);
      cursor: pointer;
      border-radius: 50%;
    }

    .scroll {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 16px 14px 140px;
      scrollbar-width: none;
    }

    .scroll::-webkit-scrollbar {
      display: none;
    }

    .scroll--tilt {
      perspective: 1200px;
      perspective-origin: 50% 40%;
    }

    .scroll-tilt-inner {
      transform-style: preserve-3d;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .bubble-row {
      display: flex;
      width: 100%;
    }

    .bubble-row--in {
      justify-content: flex-start;
    }

    .bubble-row--out {
      justify-content: flex-end;
    }

    .bubble {
      max-width: 88%;
      padding: 10px 14px 8px;
      border-radius: 18px;
      font-size: 0.875rem;
      line-height: 1.45;
    }

    .bubble--in {
      background: var(--bubble-in);
      color: var(--text);
      border-bottom-left-radius: 6px;
    }

    .bubble--out {
      background: var(--white);
      color: #111;
      border-bottom-right-radius: 6px;
    }

    .bubble-meta {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 6px;
      margin-top: 6px;
      font-size: 0.625rem;
      opacity: 0.65;
    }

    .bubble--out .bubble-meta {
      color: #333;
    }

    .bubble-row--anim {
      opacity: 0;
      transform: translateY(14px) scale(0.97);
    }

    .bubble-row--anim.is-shown {
      animation: bubblePop 0.55s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    @keyframes bubblePop {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .bubble-row--anim {
        opacity: 1;
        transform: none;
      }

      .bubble-row--anim.is-shown {
        animation: none;
      }
    }

    .chat-input-bar {
      position: absolute;
      bottom: 72px;
      left: 0;
      right: 0;
      z-index: 4;
      padding: 10px 12px 10px;
      background: linear-gradient(to top, var(--surface) 70%, transparent);
    }

    .chat-input-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(0, 0, 0, 0.35);
    }

    .chat-input-wrap input {
      flex: 1;
      border: none;
      background: transparent;
      color: var(--text);
      font-family: inherit;
      font-size: 0.9375rem;
      outline: none;
    }

    .chat-input-wrap input::placeholder {
      color: var(--text-muted);
    }

    .chat-attach {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--white);
      color: #111;
      border: none;
      display: grid;
      place-items: center;
      cursor: pointer;
      flex-shrink: 0;
    }

    .bottom-nav {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 4;
      height: 72px;
      background: var(--surface);
      border-top: 1px solid var(--grey-line);
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 0 12px max(8px, env(safe-area-inset-bottom));
    }

    .nav-icon {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      color: var(--text-muted);
      text-decoration: none;
    }

    .nav-icon.active {
      color: var(--text);
    }

    .nav-showcase {
      position: absolute;
      bottom: 76px;
      left: 0;
      right: 0;
      z-index: 5;
      text-align: center;
      font-size: 11px;
      font-family: system-ui, sans-serif;
      color: rgba(255, 255, 255, 0.35);
      pointer-events: none;
    }

    .nav-showcase a {
      pointer-events: auto;
      color: rgba(255, 255, 255, 0.5);
      margin: 0 6px;
    }
  </style>
</head>
<body>
  <div class="device chat-reveal">
    <header class="chat-header">
      <a href="4.html" class="chat-back" aria-label="Volver">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M15 18l-6-6 6-6" />
        </svg>
      </a>
      <img
        class="chat-peer-avatar"
        src="https://images.unsplash.com/photo-1459749411175-04bf5292ceea?w=120&q=70"
        alt=""
      />
      <div class="chat-peer-text">
        <div class="chat-peer-name">Playagency X</div>
        <div class="chat-peer-sub">Mountain Fest 2026 · Filmmaker &amp; Dancers</div>
      </div>
      <button type="button" class="chat-more" aria-label="Más opciones">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <circle cx="5" cy="12" r="2" />
          <circle cx="12" cy="12" r="2" />
          <circle cx="19" cy="12" r="2" />
        </svg>
      </button>
    </header>

    <div class="scroll scroll--tilt" id="chat-scroll">
      <div class="scroll-tilt-inner" id="chat-stream" aria-live="polite">
        <!-- Burbujas inyectadas por script: primero vacío, luego animación secuencial -->
      </div>
    </div>

    <div class="chat-input-bar">
      <div class="chat-input-wrap">
        <button type="button" class="chat-attach" aria-label="Adjuntar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48" />
          </svg>
        </button>
        <input type="text" placeholder="Mensaje…" aria-label="Escribir mensaje" />
      </div>
    </div>

    <nav class="bottom-nav" aria-label="Navegación principal">
      <a href="2.html" class="nav-icon" aria-label="Inicio">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
          <polyline points="9 22 9 12 15 12 15 22" />
        </svg>
      </a>
      <a href="6.html" class="nav-icon" aria-label="Mis proyectos">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />
        </svg>
      </a>
      <span class="nav-icon active">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
          <polyline points="22,6 12,13 2,6" />
        </svg>
      </span>
      <a href="5.html" class="nav-icon" aria-label="Perfil">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg>
      </a>
    </nav>

    <div class="nav-showcase">
      <span>4.1 · Chat</span>
      <a href="4.html">← lista</a>
    </div>
  </div>
  <script src="showcase-scroll-tilt.js"></script>
  <script>
    (function () {
      const root = document.getElementById("chat-stream");
      const scrollEl = document.getElementById("chat-scroll");
      const reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      function appendBubble(role, text, metaHtml) {
        const row = document.createElement("div");
        row.className =
          "bubble-row " +
          (role === "in" ? "bubble-row--in" : "bubble-row--out") +
          " bubble-row--anim";
        row.innerHTML =
          '<div class="bubble bubble--' +
          (role === "in" ? "in" : "out") +
          '">' +
          text +
          metaHtml +
          "</div>";
        root.appendChild(row);
        requestAnimationFrame(() => {
          row.classList.add("is-shown");
          scrollEl?.scrollTo({ top: scrollEl.scrollHeight, behavior: reduce ? "auto" : "smooth" });
        });
      }

      function metaIn(time) {
        return '<div class="bubble-meta">' + time + "</div>";
      }

      function metaOut(time) {
        return (
          '<div class="bubble-meta">' +
          time +
          '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5" /></svg></div>'
        );
      }

      function run() {
        appendBubble("in", "hola que tal", metaIn("10:08"));
        if (reduce) {
          appendBubble("out", "K LO K 🔥", metaOut("10:09"));
        } else {
          setTimeout(() => {
            appendBubble("out", "K LO K 🔥", metaOut("10:09"));
          }, 720);
        }
      }

      if (reduce) {
        run();
      } else {
        setTimeout(run, 480);
      }
    })();
  </script>
</body>
</html>
