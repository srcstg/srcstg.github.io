<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta property="og:title" content="Tuto & Davo — Nuestro Matrimonio" />
  <meta property="og:description" content="Galería de fotos de nuestro día especial." />
  <meta property="og:image" content="https://tutoydavo.d10.cl/ttyd2.png" />
  <meta property="og:url" content="https://tyd.d10.cl/" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://tutoydavo.d10.cl/ttyd2.png" />
  <title>Tuto & Davo</title>
  <link rel="shortcut icon" href="../img/favico.png">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Mulish:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #f9f5f0;
      --warm-white: #fdfaf7;
      --brown: #3a3026;
      --brown-light: #6b5c4e;
      --gold: #c9a96e;
      --gold-light: #e8d5b0;
      --rose: #d4a5a5;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--cream);
      color: var(--brown);
      font-family: 'Mulish', sans-serif;
      font-weight: 300;
      min-height: 100vh;
    }

    /* ── HERO ── */
    .hero {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      position: relative;
      background: var(--warm-white);
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 80%, rgba(201,169,110,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 80% 20%, rgba(212,165,165,0.10) 0%, transparent 60%);
      pointer-events: none;
    }

    .hero-ornament {
      font-size: clamp(0.7rem, 1.5vw, 0.9rem);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1.5rem;
      font-weight: 400;
    }

    .hero-names {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3.5rem, 10vw, 8rem);
      font-weight: 300;
      line-height: 1;
      letter-spacing: -0.02em;
      color: var(--brown);
    }

    .hero-names em {
      font-style: italic;
      color: var(--brown-light);
    }

    .hero-amp {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(2rem, 6vw, 5rem);
      color: var(--gold);
      display: block;
      line-height: 1.2;
    }

    .hero-date {
      margin-top: 2rem;
      font-size: clamp(0.75rem, 1.8vw, 0.95rem);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--brown-light);
    }

    .hero-divider {
      width: 60px;
      height: 1px;
      background: var(--gold);
      margin: 2.5rem auto;
      opacity: 0.6;
    }

    .hero-scroll {
      position: absolute;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      color: var(--brown-light);
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-decoration: none;
      opacity: 0.6;
      transition: opacity 0.3s;
    }
    .hero-scroll:hover { opacity: 1; }
    .hero-scroll-line {
      width: 1px;
      height: 40px;
      background: var(--gold);
      animation: scrollPulse 2s ease-in-out infinite;
    }
    @keyframes scrollPulse {
      0%, 100% { opacity: 0.4; transform: scaleY(1); }
      50% { opacity: 1; transform: scaleY(1.1); }
    }

    /* ── GALLERY SECTION ── */
    .gallery-section {
      padding: clamp(3rem, 8vw, 7rem) clamp(1rem, 4vw, 3rem);
      max-width: 1400px;
      margin: 0 auto;
    }

    .section-header {
      text-align: center;
      margin-bottom: clamp(2rem, 5vw, 4rem);
    }

    .section-label {
      font-size: 0.75rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1rem;
    }

    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 300;
      font-style: italic;
      color: var(--brown);
    }

    /* ── PHOTO GRID ── */
    .photo-grid {
      columns: 3;
      column-gap: 1rem;
      gap: 1rem;
    }

    @media (max-width: 900px) { .photo-grid { columns: 2; } }
    @media (max-width: 500px) { .photo-grid { columns: 1; } }

    .photo-item {
      break-inside: avoid;
      margin-bottom: 1rem;
      position: relative;
      overflow: hidden;
      border-radius: 4px;
      cursor: zoom-in;
      background: var(--gold-light);
    }

    .photo-item img {
      display: block;
      width: 100%;
      height: auto;
      transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      object-fit: cover;
    }

    .photo-item::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(58, 48, 38, 0);
      transition: background 0.3s;
    }

    .photo-item:hover img { transform: scale(1.04); }
    .photo-item:hover::after { background: rgba(58, 48, 38, 0.08); }

    /* ── SECTION DIVIDERS ── */
    .gallery-block { margin-bottom: clamp(3rem, 6vw, 5rem); }

    .gallery-section-divider {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      margin-bottom: clamp(1.5rem, 3vw, 2.5rem);
    }

    .gsn-line {
      flex: 1;
      height: 1px;
      background: var(--gold);
      opacity: 0.35;
    }

    .gsn-label {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(1.4rem, 3vw, 2.2rem);
      color: var(--brown-light);
      white-space: nowrap;
      font-weight: 300;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 5rem 2rem;
      color: var(--brown-light);
    }

    .empty-state-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      opacity: 0.3;
    }

    .empty-state p {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.5rem;
      opacity: 0.5;
    }

    /* ── LIGHTBOX ── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(20, 15, 10, 0.96);
      align-items: center;
      justify-content: center;
      padding: 1rem;
      backdrop-filter: blur(4px);
    }

    .lightbox.active { display: flex; }

    .lightbox-inner {
      position: relative;
      max-width: min(90vw, 1100px);
      max-height: 90svh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lightbox-img {
      max-width: 100%;
      max-height: 90svh;
      object-fit: contain;
      border-radius: 3px;
      box-shadow: 0 40px 80px rgba(0,0,0,0.5);
    }

    .lightbox-close {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      background: none;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50%;
      color: rgba(255,255,255,0.8);
      width: 44px;
      height: 44px;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .lightbox-close:hover { background: rgba(255,255,255,0.1); color: #fff; }

    .lightbox-nav {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 50%;
      color: rgba(255,255,255,0.7);
      width: 48px;
      height: 48px;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .lightbox-nav:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .lightbox-prev { left: 1.5rem; }
    .lightbox-next { right: 1.5rem; }

    .lightbox-bottom {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .lightbox-counter {
      color: rgba(255,255,255,0.4);
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      white-space: nowrap;
    }

    .lightbox-download {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      color: rgba(255,255,255,0.55);
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 2rem;
      padding: 0.4rem 1rem;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .lightbox-download:hover {
      color: #fff;
      border-color: rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.07);
    }
    .lightbox-download svg {
      width: 13px;
      height: 13px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--brown-light);
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      opacity: 0.5;
    }

    footer a { color: inherit; text-decoration: none; }
    footer a:hover { opacity: 0.8; }
  </style>
</head>
<body>

  <!-- HERO -->
  <section class="hero">
    <p class="hero-ornament">✦ Nuestro Matrimonio ✦</p>
    <h1 class="hero-names">
      Tuto
      <span class="hero-amp">&amp;</span>
      Davo
    </h1>
    <div class="hero-divider"></div>
    <p class="hero-date"><!-- Agrega la fecha aquí --></p>
    <a href="#galeria" class="hero-scroll">
      <span>Ver fotos</span>
      <span class="hero-scroll-line"></span>
    </a>
  </section>

  <!-- GALERÍA -->
  <section class="gallery-section" id="galeria">
    <div class="section-header">
      <p class="section-label">Recuerdos</p>
      <h2 class="section-title">Nuestra historia en imágenes</h2>
    </div>

    <div id="photoGrid"></div>

    <!-- Aparece solo si no hay fotos -->
    <div class="empty-state" id="emptyState">
      <div class="empty-state-icon">✦</div>
      <p>Las fotos llegarán pronto...</p>
    </div>
  </section>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
    <button class="lightbox-close" id="lbClose" aria-label="Cerrar">✕</button>
    <button class="lightbox-nav lightbox-prev" id="lbPrev" aria-label="Anterior">‹</button>
    <div class="lightbox-inner">
      <img class="lightbox-img" id="lbImg" src="" alt="">
    </div>
    <button class="lightbox-nav lightbox-next" id="lbNext" aria-label="Siguiente">›</button>
    <div class="lightbox-bottom">
      <div class="lightbox-counter" id="lbCounter"></div>
      <a class="lightbox-download" id="lbDownload" href="#" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Ver original
      </a>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <p>Tuto &amp; Davo &nbsp;·&nbsp; Hecho con amor</p>
  </footer>

  <script>
    const WORKER_URL = 'https://patient-bird-0a3b.david-cfb.workers.dev/';

    const grid = document.getElementById('photoGrid');
    const emptyState = document.getElementById('emptyState');
    const lightbox = document.getElementById('lightbox');
    const lbImg = document.getElementById('lbImg');
    const lbClose = document.getElementById('lbClose');
    const lbPrev = document.getElementById('lbPrev');
    const lbNext = document.getElementById('lbNext');
    const lbCounter  = document.getElementById('lbCounter');
    const lbDownload = document.getElementById('lbDownload');

    let FOTOS = [];
    let current = 0;

    async function loadFotos() {
      try {
        const res = await fetch(WORKER_URL);
        FOTOS = await res.json();
      } catch (e) {
        console.error('No se pudieron cargar las fotos:', e);
      }
      buildGrid();
    }

    function formatFolder(name) {
      return name.replace(/^\d+\s+/, '').replace(/^\w/, c => c.toUpperCase());
    }

    function buildGrid() {
      if (FOTOS.length === 0) {
        emptyState.style.display = 'block';
        return;
      }
      emptyState.style.display = 'none';

      // Group by folder
      const groups = new Map();
      FOTOS.forEach((url, i) => {
        const path = decodeURIComponent(url.replace('https://tutoydavo.d10.cl/', ''));
        const parts = path.split('/');
        const folder = parts.length > 1 ? parts[0] : 'General';
        if (!groups.has(folder)) groups.set(folder, []);
        groups.get(folder).push({ url, index: i });
      });

      // Render each section
      [...groups.keys()].sort().forEach(folder => {
        const block = document.createElement('div');
        block.className = 'gallery-block';

        const divider = document.createElement('div');
        divider.className = 'gallery-section-divider';
        divider.innerHTML = `<span class="gsn-line"></span><span class="gsn-label">${formatFolder(folder)}</span><span class="gsn-line"></span>`;
        block.appendChild(divider);

        const photoGrid = document.createElement('div');
        photoGrid.className = 'photo-grid';

        groups.get(folder).forEach(({ url, index }) => {
          const item = document.createElement('div');
          item.className = 'photo-item';
          item.setAttribute('role', 'button');
          item.setAttribute('tabindex', '0');
          item.setAttribute('aria-label', `Ver foto ${index + 1}`);

          const img = document.createElement('img');
          img.src = url;
          img.alt = `Foto ${index + 1}`;
          img.loading = 'lazy';

          item.appendChild(img);
          item.addEventListener('click', () => openLightbox(index));
          item.addEventListener('keydown', e => { if (e.key === 'Enter') openLightbox(index); });
          photoGrid.appendChild(item);
        });

        block.appendChild(photoGrid);
        grid.appendChild(block);
      });
    }

    function openLightbox(index) {
      current = index;
      lbImg.src = FOTOS[current];
      lbImg.alt = `Foto ${current + 1} de ${FOTOS.length}`;
      lbCounter.textContent = `${current + 1} / ${FOTOS.length}`;
      lbDownload.href = FOTOS[current];
      lightbox.classList.add('active');
      document.body.style.overflow = 'hidden';
      lbImg.focus();
    }

    function closeLightbox() {
      lightbox.classList.remove('active');
      document.body.style.overflow = '';
    }

    function navigate(dir) {
      current = (current + dir + FOTOS.length) % FOTOS.length;
      lbImg.src = FOTOS[current];
      lbImg.alt = `Foto ${current + 1} de ${FOTOS.length}`;
      lbCounter.textContent = `${current + 1} / ${FOTOS.length}`;
      lbDownload.href = FOTOS[current];
    }

    lbClose.addEventListener('click', closeLightbox);
    lbPrev.addEventListener('click', () => navigate(-1));
    lbNext.addEventListener('click', () => navigate(1));

    lightbox.addEventListener('click', e => {
      if (e.target === lightbox) closeLightbox();
    });

    document.addEventListener('keydown', e => {
      if (!lightbox.classList.contains('active')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') navigate(-1);
      if (e.key === 'ArrowRight') navigate(1);
    });

    loadFotos();
  </script>
</body>
</html>
